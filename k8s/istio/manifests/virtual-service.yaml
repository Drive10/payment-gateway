apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: payment-gateway-vs
  namespace: payment-gateway
spec:
  hosts:
  - payment-gateway
  gateways:
  - payment-gateway-gw
  http:
  - match:
    - uri:
        prefix: /api/v1
    route:
    - destination:
        host: api-gateway.payment-gateway.svc.cluster.local
        port:
          number: 8080
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: gateway-error,connect-failure,refused-stream
    timeout: 30s
  - match:
    - uri:
        prefix: /swagger
    route:
    - destination:
        host: api-gateway.payment-gateway.svc.cluster.local
        port:
          number: 8080

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: payment-gateway-dr
  namespace: payment-gateway
spec:
  host: api-gateway.payment-gateway.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: UPGRADE
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
    loadBalancer:
      simple: LEAST_REQUEST
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
  - name: v1
    labels:
      version: v1
  - name: v2
    labels:
      version: v2