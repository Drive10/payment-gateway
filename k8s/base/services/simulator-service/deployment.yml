apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator-service
  namespace: payflow
  labels:
    app: simulator-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simulator-service
  template:
    metadata:
      labels:
        app: simulator-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8086"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: simulator-service
          image: simulator-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8086
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: simulator-service
  namespace: payflow
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8086
      name: http
  selector:
    app: simulator-service