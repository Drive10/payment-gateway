apiVersion: v1
kind: Secret
metadata:
  name: payment-gateway-secrets
  namespace: payment-gateway
type: Opaque
stringData:
  # Database credentials (replace with Vault values)
  db-password: change-me
  db-username: payment
  
  # Redis credentials
  redis-password: change-me
  
  # JWT secrets
  jwt-secret: change-me
  jwt-refresh-secret: change-me
  
  # Internal API secret
  internal-secret: change-me
  
  # Payment gateway API keys
  payment-gateway-api-key: change-me
  payment-gateway-api-secret: change-me
  
  # Vault
  vault-token: change-me
  
  # PostgreSQL master credentials
  postgres-password: change-me
  postgres-user: payment
