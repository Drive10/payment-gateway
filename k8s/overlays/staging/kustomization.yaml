apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: payment-gateway-staging

resources:
  - ../../helm/payment-gateway

commonLabels:
  environment: staging

configMapGenerator:
  - name: payment-gateway-config
    literals:
      - SPRING_PROFILES_ACTIVE=staging
      - LOG_LEVEL=INFO

replicas:
  - name: api-gateway
    count: 2
  - name: payment-service
    count: 2
  - name: auth-service
    count: 2