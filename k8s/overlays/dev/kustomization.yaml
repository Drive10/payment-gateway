apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: payment-gateway-dev

resources:
  - ../../helm/payment-gateway

commonLabels:
  environment: dev

configMapGenerator:
  - name: payment-gateway-config
    literals:
      - SPRING_PROFILES_ACTIVE=dev
      - LOG_LEVEL=DEBUG

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      labelSelector: app=api-gateway
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      labelSelector: app=payment-service

replicas:
  - name: api-gateway
    count: 1
  - name: payment-service
    count: 1
  - name: auth-service
    count: 1