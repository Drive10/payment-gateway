# ============================================================
# Payment Gateway Alert Rules
# ============================================================

groups:
  - name: payment-gateway-services
    interval: 30s
    rules:
      # Service down alerts
      - alert: ServiceDown
        expr: up{job=~"auth-service|order-service|payment-service|notification-service|simulator-service|analytics-service|api-gateway"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 2 minutes"

      # High error rate alerts
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.job }}"

      # High response time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time on {{ $labels.job }}"
          description: "95th percentile response time is {{ $value }}s"

      # Database connection pool exhausted
      - alert: DatabaseConnectionPoolExhausted
        expr: hikaricp_connections_active / hikaricp_connections_max > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool near capacity on {{ $labels.job }}"
          description: "Active connections: {{ $value | humanizePercentage }}"

  - name: payment-gateway-infrastructure
    interval: 30s
    rules:
      # Kafka consumer lag
      - alert: KafkaConsumerLag
        expr: kafka_consumer_group_lag > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag for group {{ $labels.consumergroup }}"
          description: "Consumer lag is {{ $value }} messages"

      # Redis memory high
      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is {{ $value | humanizePercentage }}"

      # PostgreSQL connections high
      - alert: PostgreSQLConnectionsHigh
        expr: pg_stat_database_numbackends / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections high"
          description: "Database {{ $labels.datname }} has {{ $value }} active connections"

  - name: payment-gateway-business
    interval: 60s
    rules:
      # Payment failures
      - alert: HighPaymentFailureRate
        expr: rate(payment_status_total{status="FAILED"}[5m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High payment failure rate"
          description: "Payment failure rate is {{ $value }} per second"

      # Webhook delivery failures
      - alert: WebhookDeliveryFailures
        expr: rate(webhook_delivery_total{status="FAILED"}[5m]) > 0.01
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High webhook delivery failure rate"
          description: "Webhook delivery failure rate is {{ $value }} per second"
