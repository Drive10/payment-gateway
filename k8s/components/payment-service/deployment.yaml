apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: payment-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: localhost:5000/payment-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: payment-gateway-config
            - secretRef:
                name: payment-gateway-secrets
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  clusterIP: None
  ports:
    - port: 8083
      targetPort: 8083
  selector:
    app: payment-service
