apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  dashboard.json: |
    {
      "dashboard": {
        "id": null,
        "uid": "payment-gateway",
        "title": "Payment Gateway Metrics",
        "tags": ["payment-gateway"],
        "timezone": "browser",
        "schemaVersion": 16,
        "version": 0,
        "refresh": "5s",
        "panels": [
          {
            "id": 1,
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
            "type": "graph",
            "title": "CPU Usage",
            "targets": [
              {
                "expr": "rate(process_cpu_seconds_total{job=\"payment-gateway\"}[5m])",
                "legendFormat": "{{job}} - {{instance}}"
              }
            ]
          },
          {
            "id": 2,
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
            "type": "graph",
            "title": "Memory Usage",
            "targets": [
              {
                "expr": "process_resident_memory_bytes{job=\"payment-gateway\"}",
                "legendFormat": "{{job}} - {{instance}}"
              }
            ]
          },
          {
            "id": 3,
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
            "type": "graph",
            "title": "HTTP Requests",
            "targets": [
              {
                "expr": "rate(http_server_requests_seconds_count[5m])",
                "legendFormat": "{{method}} {{uri}}"
              }
            ]
          },
          {
            "id": 4,
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
            "type": "graph",
            "title": "JVM Memory",
            "targets": [
              {
                "expr": "jvm_memory_used_bytes{area=\"heap\"}",
                "legendFormat": "{{area}} - {{id}}"
              }
            ]
          }
        ]
      }
    }
