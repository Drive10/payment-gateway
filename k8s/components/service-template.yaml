apiVersion: apps/v1
kind: Deployment
metadata:
  name: SERVICE_NAME
  namespace: payment-gateway
  labels:
    app: SERVICE_NAME
    version: VERSION
spec:
  replicas: REPLICAS
  selector:
    matchLabels:
      app: SERVICE_NAME
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: SERVICE_NAME
        version: VERSION
    spec:
      containers:
        - name: SERVICE_NAME
          image: IMAGE_NAME
          imagePullPolicy: Always
          ports:
            - containerPort: PORT
              name: http
          envFrom:
            - configMapRef:
                name: payment-gateway-config
            - secretRef:
                name: payment-gateway-secrets
          resources:
            requests:
              memory: "MEMORY_REQUEST"
              cpu: "CPU_REQUEST"
            limits:
              memory: "MEMORY_LIMIT"
              cpu: "CPU_LIMIT"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: PORT
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: PORT
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: PORT
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: SERVICE_NAME
  namespace: payment-gateway
spec:
  type: ClusterIP
  ports:
    - port: PORT
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: SERVICE_NAME
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: SERVICE_NAME
  namespace: payment-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: SERVICE_NAME
  minReplicas: MIN_REPLICAS
  maxReplicas: MAX_REPLICAS
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
