{{- $root := . -}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $root.Values.global.namespace }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payment-gateway-ingress
  namespace: {{ $root.Values.global.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: {{ $root.Values.ingress.className }}
  tls:
  - hosts:
    - {{ first $root.Values.ingress.hosts | .host }}
    secretName: payment-tls
  rules:
{{- range $host := $root.Values.ingress.hosts }}
  - host: {{ $host.host }}
    http:
      paths:
      - path: {{ $host.paths[0].path }}
        pathType: {{ $host.paths[0].pathType }}
        backend:
          service:
            name: {{ $host.paths[0].service }}
            port:
              number: {{ $host.paths[0].port }}
{{- end }}