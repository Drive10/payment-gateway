{{- $root := . -}}
{{- $svc := .Values.services.apiGateway -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ $root.Values.global.namespace }}
  labels:
    app: api-gateway
    version: {{ $root.Values.appVersion }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: {{ $root.Values.appVersion }}
    spec:
      priorityClassName: payment-service
      containers:
      - name: api-gateway
        image: {{ $svc.image }}
        ports:
        - containerPort: {{ $svc.port }}
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        - name: REDIS_HOST
          value: {{ $root.Values.global.redis.host }}
        - name: REDIS_PASSWORD
          value: {{ $root.Values.global.redis.password }}
        - name: JWT_SECRET_B64
          value: {{ $root.Values.global.jwt.secret }}
        - name: GATEWAY_INTERNAL_SECRET
          value: {{ $root.Values.global.gateway.internalSecret }}
        resources:
          requests:
            memory: {{ $svc.resources.requests.memory }}
            cpu: {{ $svc.resources.requests.cpu }}
          limits:
            memory: {{ $svc.resources.limits.memory }}
            cpu: {{ $svc.resources.limits.cpu }}
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: {{ $svc.port }}
          initialDelaySeconds: {{ $root.Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ $root.Values.livenessProbe.periodSeconds }}
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: {{ $svc.port }}
          initialDelaySeconds: {{ $root.Values.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ $root.Values.readinessProbe.periodSeconds }}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ $root.Values.global.namespace }}
spec:
  selector:
    app: api-gateway
  ports:
  - port: {{ $svc.port }}
    targetPort: {{ $svc.port }}
  type: ClusterIP