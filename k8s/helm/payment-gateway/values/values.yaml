global:
  namespace: payment-gateway
  imageRegistry: ghcr.io
  imagePullPolicy: IfNotPresent

  postgres:
    host: postgres
    port: 5432
    user: payment
    password: changeme
    database: paymentdb

  redis:
    host: redis
    port: 6379
    password: changeme

  kafka:
    bootstrapServers: kafka:29092

  jwt:
    secret: changeme

  gateway:
    internalSecret: changeme

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
  hosts:
    - host: payment.local
      paths:
        - path: /
          pathType: Prefix
          service: api-gateway
          port: 8080
  tls:
    - secretName: payment-tls
      hosts:
        - payment.local

services:
  api-gateway:
    enabled: true
    replicas: 2
    image: payment-gateway/api-gateway:latest
    port: 8080
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  auth-service:
    enabled: true
    replicas: 2
    image: payment-gateway/auth-service:latest
    port: 8081
    database: authdb
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  order-service:
    enabled: true
    replicas: 2
    image: payment-gateway/order-service:latest
    port: 8082
    database: orderdb
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  payment-service:
    enabled: true
    replicas: 3
    image: payment-gateway/payment-service:latest
    port: 8083
    database: paymentdb
    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "1Gi"
        cpu: "1000m"

  notification-service:
    enabled: true
    replicas: 2
    image: payment-gateway/notification-service:latest
    port: 8084
    database: notificationdb
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  webhook-service:
    enabled: true
    replicas: 2
    image: payment-gateway/webhook-service:latest
    port: 8085
    database: webhookdb
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  simulator-service:
    enabled: true
    replicas: 1
    image: payment-gateway/simulator-service:latest
    port: 8086
    database: simulatordb
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  settlement-service:
    enabled: true
    replicas: 2
    image: payment-gateway/settlement-service:latest
    port: 8087
    database: settlementdb
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  risk-service:
    enabled: true
    replicas: 2
    image: payment-gateway/risk-service:latest
    port: 8088
    database: riskdb
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  analytics-service:
    enabled: true
    replicas: 2
    image: payment-gateway/analytics-service:latest
    port: 8089
    database: analyticsdb
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  merchant-service:
    enabled: true
    replicas: 2
    image: payment-gateway/merchant-service:latest
    port: 8090
    database: merchantdb
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  dispute-service:
    enabled: true
    replicas: 2
    image: payment-gateway/dispute-service:latest
    port: 8091
    database: disputedb
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  frontend:
    enabled: true
    replicas: 2
    image: payment-gateway/frontend:latest
    port: 80
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "200m"

  dashboard:
    enabled: true
    replicas: 1
    image: payment-gateway/dashboard:latest
    port: 3001
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"

monitoring:
  enabled: true
  prometheus:
    enabled: true
    retention: 15d
    storageSize: 50Gi
  grafana:
    enabled: true
    adminPassword: changeme
    persistence:
      enabled: true
      size: 10Gi
  loki:
    enabled: true
    persistence:
      enabled: true
      size: 10Gi
  promtail:
    enabled: true

postgresql:
  enabled: true
  image: postgres:16-alpine
  auth:
    username: payment
    password: changeme
    database: paymentdb
  primary:
    persistence:
      enabled: true
      size: 20Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

redis:
  enabled: true
  image: redis:7-alpine
  auth:
    password: changeme
  persistence:
    enabled: true
    size: 5Gi

kafka:
  enabled: true
  image: apache/kafka:3.7.0
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

priorityClasses:
  criticalSystem: 1000000
  paymentService: 900000

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3