server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: notification-service

payflow:
  database:
    name: payflow_notification

application:
  payment-service:
    url: ${PAYMENT_SERVICE_URL}
  kafka:
    topic:
      notification-events: notification.events
      webhook-updates: webhook.updates
  webhook:
    signature:
      enabled: true
      secret: ${WEBHOOK_SIGNATURE_SECRET}
      tolerance-seconds: 300
    retry:
      interval-ms: 30000
      max-attempts: 5
  email:
    from-address: ${EMAIL_FROM_ADDRESS:noreply@payflow.local}
    from-name: PayFlow
  sms:
    provider: SIMULATOR