server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: notification-service

# PayFlow Centralized Configuration
payflow:
  database:
    enabled: true
    name: payflow_notification
  redis:
    enabled: true
  kafka:
    enabled: true

application:
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://payment-service:8083}
  kafka:
    topic:
      notification-events: notification.events
      webhook-updates: webhook.updates
  webhook:
    signature:
      enabled: true
      secret: ${WEBHOOK_SIGNATURE_SECRET:change-me-in-production}
      tolerance-seconds: 300
    retry:
      interval-ms: 30000
      max-attempts: 5
  email:
    from-address: noreply@payment-gateway.local
    from-name: Payment Gateway
  sms:
    provider: SIMULATOR

logging:
  level:
    root: INFO