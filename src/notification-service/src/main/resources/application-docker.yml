server:
  port: 8084

payflow:
  redis:
    enabled: false

spring:
  application:
    name: notification-service
  profiles:
    active: docker

application:
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://payment-service:8083}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
  webhook:
    signature:
      enabled: true
      secret: ${WEBHOOK_SIGNATURE_SECRET:dev_webhook_secret}
      tolerance-seconds: 300

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
