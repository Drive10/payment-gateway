# Local development configuration - overrides application.yml

server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payflow_notification
    username: ${DB_USERNAME:payflow}
    password: ${DB_PASSWORD:payflow}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:dev-redis-password-123}
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service

# Disable centralized config for local dev
payflow:
  database:
    enabled: false
  redis:
    enabled: false
  kafka:
    enabled: false

application:
  payment-service:
    url: http://localhost:8083

logging:
  level:
    root: INFO
    dev.payment.notificationservice: DEBUG