server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: audit-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

payflow:
  database:
    name: audit_db

application:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    topic:
      audit-events: audit.events