server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: audit-service
  profiles:
    active: docker
  data:
    mongodb:
      host: ${MONGODB_HOST:mongodb}
      port: ${MONGODB_PORT:27017}
      database: ${MONGODB_DATABASE:audit_db}
      username: ${MONGODB_USERNAME:audit}
      password: ${MONGODB_PASSWORD:audit}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    consumer:
      group-id: audit-service
      auto-offset-reset: earliest

application:
  kafka:
    topic:
      audit-events: audit.events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0