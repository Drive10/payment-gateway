server:
  port: ${SERVER_PORT:8089}

spring:
  application:
    name: analytics-service
  profiles:
    active: docker
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:payflow}

payflow:
  database:
    name: payflow_analytics

application:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    topic:
      payment-events: payment.events
      order-events: order.events
  analytics:
    batch-size: 100
    window-size: PT1H

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0