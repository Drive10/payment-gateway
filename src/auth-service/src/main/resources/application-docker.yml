spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:postgresql://postgres:5432/payflow
    username: payflow
    password: ${POSTGRES_PASSWORD}
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

app:
  jwt:
    secret: ${JWT_SECRET}
  internal-auth:
    secret: ${INTERNAL_AUTH_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

server:
  port: 8082