spring:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://postgres:5432/payflow
    username: payflow
    password: ${POSTGRES_PASSWORD}
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

app:
  jwt:
    secret: ${JWT_SECRET}
  internal-auth:
    secret: ${INTERNAL_AUTH_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always