spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payflow_auth
    username: ${DB_USERNAME:payflow}
    password: ${DB_PASSWORD:payflow}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:dev-redis-password-123}
  kafka:
    bootstrap-servers: localhost:9092

application:
  jwt:
    secret: dev-jwt-secret-key-for-local-testing-must-be-at-least-32-characters

server:
  port: 8081

logging:
  level:
    root: INFO
    dev.payment.authservice: DEBUG
