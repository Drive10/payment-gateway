server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: auth-service
  flyway:
    enabled: false

# PayFlow Centralized Configuration
payflow:
  database:
    enabled: true
    name: payflow_auth
  redis:
    enabled: true

application:
  jwt:
    secret: ${JWT_SECRET:}
    expiration: 86400000
    refresh-expiration: 604800000

resilience4j:
  ratelimiter:
    instances:
      login:
        limit-for-period: 100
        limit-refresh-period: 60s
        timeout-duration: 10s
        register-health-indicator: true
        event-consumer-buffer-size: 100
      register:
        limit-for-period: 100
        limit-refresh-period: 60s
        timeout-duration: 30s
        register-health-indicator: true
      refresh:
        limit-for-period: 100
        limit-refresh-period: 60s
        timeout-duration: 5s
        register-health-indicator: true

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    dev.payment.authservice: DEBUG