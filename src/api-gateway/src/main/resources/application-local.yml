# Local development configuration - overrides application.yml

server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - RewritePath=/api/v1/auth/(?<segment>.*), /auth/${segment}
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=2
        - id: payment-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/payments/**,/api/v1/admin/**
          filters:
            - StripPrefix=2
        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=2
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:dev-redis-password-123}

# Disable centralized config for local dev
payflow:
  database:
    enabled: false
  redis:
    enabled: false

application:
  gateway:
    internal-secret: dev-gateway-secret

security:
  jwt:
    secret-key: ${JWT_SECRET:dev-jwt-secret-key-for-local-testing-must-be-at-least-32-characters}
    secret-key-base64: ZGV2LWp1dC1zZWNyZXQta2V5LWZvci1sb2NhbC10ZXN0aW5nLW11c3QtYmUtYXQtbGVhc3QtMzItY2hhcmFjdGVycw==

logging:
  level:
    root: INFO
    dev.payment.apigateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always