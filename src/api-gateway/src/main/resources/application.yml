server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=1
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=1
        - id: payment-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=1
        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=1

payflow:
  redis:
    enabled: true

application:
  jwt:
    secret: ${JWT_SECRET:mh3iJdU13D+zSw2CRt842tDRxdGanGbPoqL7opdlpWw=}
    expiration: 86400000

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG