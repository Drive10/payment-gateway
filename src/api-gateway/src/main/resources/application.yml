server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway

# PayFlow Centralized Configuration
payflow:
  redis:
    enabled: true

application:
  jwt:
    secret: ${JWT_SECRET:}
    expiration: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    dev.payment.apigateway: DEBUG