server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=1
        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=1
        - id: payment-service
          uri: http://payment-service:8083
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=1
        - id: notification-service
          uri: http://notification-service:8084
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=1

payflow:
  redis:
    enabled: true

security:
  jwt:
    secret-key: ${JWT_SECRET}

application:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG