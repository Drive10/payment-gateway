server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/auth/**,/merchant/auth/**
          filters:
            - StripPrefix=0
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
      globalcors:
        cors-configurations:
          '[/**]':
            allowedorigins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
            allowedmethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedheaders:
              - "*"
            allowcredentials: true

app:
  jwt:
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}