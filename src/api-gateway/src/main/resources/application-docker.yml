server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: ${CORS_ALLOWED_ORIGINS}
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600
      routes:
        - id: auth-service
          uri: http://auth-service:8082
          predicates:
            - Path=/auth/**
        - id: auth-service-v1
          uri: http://auth-service:8082
          predicates:
            - Path=/api/v1/auth/**
        - id: payment-service
          uri: http://payment-service:8083
          predicates:
            - Path=/api/payments/**
        - id: payment-service-v1
          uri: http://payment-service:8083
          predicates:
            - Path=/api/v1/payments/**
        - id: swagger-ui
          uri: http://payment-service:8083
          predicates:
            - Path=/swagger-ui/**,/v3/api-docs/**
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

app:
  jwt:
    secret: ${JWT_SECRET}
  internal-auth:
    secret: ${INTERNAL_AUTH_SECRET}