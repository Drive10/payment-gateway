# Docker Profile
# Use: when running in Docker containers

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:payflow}
    username: ${POSTGRES_USER:payflow}
    password: ${POSTGRES_PASSWORD:payflow}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:payflow}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

payflow:
  database:
    enabled: true
  kafka:
    enabled: true
  service:
    urls:
      payment: ${PAYMENT_SERVICE_URL:http://payment-service:8083}
      notification: ${NOTIFICATION_SERVICE_URL:http://notification-service:8084}

logging:
  level:
    root: WARN
    dev.payment.orderservice: INFO