# Local Development Profile
# Use: mvn spring-boot:run -Dspring-boot.run.profiles=local
# Or: export SPRING_PROFILES_ACTIVE=local

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:payflow}
    username: ${POSTGRES_USER:payflow}
    password: ${POSTGRES_PASSWORD:payflow}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:payflow}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

payflow:
  database:
    enabled: true
  kafka:
    enabled: true

logging:
  level:
    root: INFO
    dev.payment.orderservice: DEBUG
    org.hibernate.SQL: WARN