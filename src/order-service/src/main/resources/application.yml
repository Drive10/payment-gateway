server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:payflow}
    username: ${DB_USERNAME:payflow}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

payflow:
  database:
    name: payflow_order

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration-seconds: 3600
      refresh-expiration-seconds: 2592000
  kafka:
    topic:
      order-events: order.events
      order-events-dlt: order.events.dlt
      payment-events: payment.events
      notification-events: notification.events