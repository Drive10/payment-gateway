server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: order-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:payflow}
    username: ${POSTGRES_USER:payflow}
    password: ${POSTGRES_PASSWORD:payflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

payflow:
  database:
    name: payflow_order

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration-seconds: ${JWT_EXPIRATION:86400000}
      refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION:604800000}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    topic:
      order-events: order.events
      order-events-dlt: order.events.dlt
      payment-events: payment.events
      notification-events: notification.events