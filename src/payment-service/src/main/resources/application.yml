server:
  port: ${SERVER_PORT:8083}

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: false
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "dev.payment.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

payment-service:
  api-key: ${PAYMENT_SERVICE_API_KEY:sk_test_merchant123}
  refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS:2592000}
  simulator:
    base-url: ${SIMULATOR_SERVICE_URL:http://localhost:8086}
  idempotency:
    redis-ttl-hours: ${IDEMPOTENCY_REDIS_TTL_HOURS:24}
  expiration:
    enabled: ${PAYMENT_EXPIRATION_ENABLED:true}
    timeout: ${PAYMENT_EXPIRATION_TIMEOUT:PT15M}
    upi-timeout: ${PAYMENT_UPI_EXPIRATION_TIMEOUT:PT5M}
  webhook:
    service-url: ${WEBHOOK_SERVICE_URL:http://localhost:8084}
    max-retries: ${WEBHOOK_MAX_RETRIES:3}
    timeout-ms: ${WEBHOOK_TIMEOUT_MS:5000}
    razorpay:
      secret: ${RAZORPAY_WEBHOOK_SECRET:dev_razorpay_secret}
    stripe:
      secret: ${STRIPE_WEBHOOK_SECRET:dev_stripe_secret}
    paypal:
      webhook-id: ${PAYPAL_WEBHOOK_ID:dev_paypal_webhook_id}
  kafka:
    topic:
      payment-events: ${KAFKA_TOPIC_PAYMENT_EVENTS:payment.events}
      payment-events-dlt: ${KAFKA_TOPIC_PAYMENT_EVENTS_DLT:payment.events.dlt}
      payment-status-updated: ${KAFKA_TOPIC_PAYMENT_STATUS_UPDATED:payment.status.updated}
      webhook-updates: ${KAFKA_TOPIC_WEBHOOK_UPDATES:webhook.updates}
  jwt:
    secret: ${JWT_SECRET:Q00qVqgM+A1zSb7FBfSGx6vzK9sUZhpxP5aBzWlLvp0=}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

payflow:
  service:
    urls:
      # Internal service URLs (now internal calls, but keeping for external compatibility)
      order: ${ORDER_SERVICE_URL:http://localhost:8080}
      payment: ${PAYMENT_SERVICE_URL:http://localhost:8080}
      auth: ${AUTH_SERVICE_URL:http://localhost:8080}

resilience4j:
  circuitbreaker:
    instances:
      paymentProvider:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 60s
        slow-call-rate-threshold: 50
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
  retry:
    instances:
      webhook:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,retries
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    redis:
      enabled: true
    db:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
