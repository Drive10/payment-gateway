server:
  port: 8083
  shutdown: graceful
  tomcat:
    max-threads: 200
    accept-count: 100
    connection-timeout: 20000

spring:
  application:
    name: payment-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:postgresql://postgres:5432/payflow_payment
    username: ${DB_USERNAME:payflow}
    password: ${DB_PASSWORD:payflow}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      pool-name: PaymentHikariPool
      register-mbeans: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:payflow-redis}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
          max-wait: 1000ms
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: kafka:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      batch-size: 32768
      buffer-memory: 67108864
      linger-ms: 5
      max-in-flight-requests-per-connection: 5
      compression-type: lz4
    consumer:
      group-id: payment-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      max-poll-records: 500
      enable-auto-commit: false
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: dev.payment.common.dto,dev.payment.paymentservice.dto
        max.poll.interval.ms: 300000
        session.timeout.ms: 10000
    listener:
      ack-mode: manual_immediate
      concurrency: 3
  # Kafka DLQ Configuration
  custom:
    kafka:
      dlt:
        topic: ${KAFKA_DLT_TOPIC:payment.events.dlt}
        retention-ms: 604800000  # 7 days
      retry:
        max-attempts: 3
        backoff-ms: 1000
        multiplier: 2
        max-backoff-ms: 30000
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

application:
  gateway-trust:
    enabled: ${GATEWAY_TRUST_ENABLED:true}
    internal-secret: ${GATEWAY_INTERNAL_SECRET:?}
  internal-auth:
    signing-secret: ${INTERNAL_SERVICE_SIGNING_SECRET:?}
  security:
    jwt:
      secret-key: ${JWT_SECRET:ZGV2LW9ubHktand0LXNlY3JldC1jaGFuZ2UtbWUtcGxlYXNlLWNoYW5nZS1pbi1wcm9kdWN0aW9uLTIwMjYtcGF5Zmxvdw==}
      expiration-seconds: 3600
      refresh-expiration-seconds: 2592000
  payment:
    default-provider: RAZORPAY_SIMULATOR
    checkout-base-url: http://frontend:5173
    vpa: payflow@upi
    merchant-name: PayFlow Merchant
  simulator:
    base-url: http://simulator-service:8086
  webhook:
    service-url: http://notification-service:8084
    max-retries: 3
    timeout-ms: 5000
    stripe:
      secret: ${STRIPE_WEBHOOK_SECRET:?}
      signing-secret: ${STRIPE_SIGNING_SECRET:?}
    razorpay:
      secret: ${RAZORPAY_WEBHOOK_SECRET:?}
    paypal:
      webhook-id: ${PAYPAL_WEBHOOK_ID:}
  order:
    service-url: http://order-service:8082
  auth:
    service-url: http://auth-service:8081
  kafka:
    topic:
      payment-events: payment.events
      payment-events-dlt: payment.events.dlt
      payment-status-updated: payment.status.updated
      webhook-updates: webhook.updates
    consumer:
      retry-attempts: 3
      retry-backoff-ms: 1000
  outbox:
    relay-delay-ms: 2000
  idempotency:
    redis-ttl-hours: 24
  reconciliation:
    enabled: true
    batch-size: 50
  expiration:
    enabled: true
    timeout: PT15M
    upi-timeout: PT5M
    lookback: PT6H

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    dev.payment: DEBUG

resilience4j:
  retry:
    instances:
      razorpay:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:
          - dev.payment.paymentservice.exception.ApiException
      stripe:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:
          - dev.payment.paymentservice.exception.ApiException
      paypal:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:
          - dev.payment.paymentservice.exception.ApiException
      orderService:
        max-attempts: 3
        wait-duration: 300ms
      notificationService:
        max-attempts: 2
        wait-duration: 200ms
  circuitbreaker:
    instances:
      razorpay:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 5s
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:
          - dev.payment.paymentservice.exception.ApiException
      stripe:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 5s
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:
          - dev.payment.paymentservice.exception.ApiException
      paypal:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 5s
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:
          - dev.payment.paymentservice.exception.ApiException
      orderService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      notificationService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  timelimiter:
    instances:
      razorpay:
        timeout-duration: 10s
        cancel-running-future: true
      stripe:
        timeout-duration: 10s
        cancel-running-future: true
      paypal:
        timeout-duration: 10s
        cancel-running-future: true
