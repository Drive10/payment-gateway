server:
  port: ${APP_PORT:8083}

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:payflow}
    username: ${POSTGRES_USER:payflow}
    password: ${POSTGRES_PASSWORD:payflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:payflow}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

app:
  simulator:
    url: ${SIMULATOR_SERVICE_URL:http://localhost:8086}
  notification:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}

payment:
  supported-currencies:
    - INR
    - USD
    - EUR
    - GBP

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html