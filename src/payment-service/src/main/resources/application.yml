server:
  port: ${SERVER_PORT:8083}
  tomcat:
    max-threads: 200
    accept-count: 100
    connection-timeout: 20000

spring:
  application:
    name: payment-service
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

payflow:
  service:
    urls:
      simulator: ${SIMULATOR_SERVICE_URL}
      notification: ${NOTIFICATION_SERVICE_URL}
      order: ${ORDER_SERVICE_URL}
      auth: ${AUTH_SERVICE_URL}

application:
  gateway-trust:
    enabled: ${GATEWAY_TRUST_ENABLED:true}
    internal-secret: ${GATEWAY_INTERNAL_SECRET}
  internal-auth:
    signing-secret: ${INTERNAL_SERVICE_SIGNING_SECRET}
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration-seconds: 3600
      refresh-expiration-seconds: 2592000
  payment:
    default-provider: RAZORPAY_SIMULATOR
    checkout-base-url: ${CHECKOUT_BASE_URL:http://frontend:5173}
    vpa: payflow@upi
    merchant-name: PayFlow Merchant
  webhook:
    max-retries: 3
    timeout-ms: 5000
    stripe:
      secret: ${STRIPE_WEBHOOK_SECRET}
      signing-secret: ${STRIPE_SIGNING_SECRET}
    razorpay:
      secret: ${RAZORPAY_WEBHOOK_SECRET}
    paypal:
      webhook-id: ${PAYPAL_WEBHOOK_ID}
  kafka:
    topic:
      payment-events: payment.events
      payment-events-dlt: payment.events.dlt
      payment-status-updated: payment.status.updated
      webhook-updates: webhook.updates
    consumer:
      retry-attempts: 3
      retry-backoff-ms: 1000
  outbox:
    relay-delay-ms: 2000
  idempotency:
    redis-ttl-hours: 24
  reconciliation:
    enabled: true
    batch-size: 50
  expiration:
    enabled: true
    timeout: PT15M
    upi-timeout: PT5M
    lookback: PT6H

resilience4j:
  retry:
    instances:
      razorpay:
        max-attempts: 3
        wait-duration: 500ms
      stripe:
        max-attempts: 3
        wait-duration: 500ms
      paypal:
        max-attempts: 3
        wait-duration: 500ms
      orderService:
        max-attempts: 3
        wait-duration: 300ms
      notificationService:
        max-attempts: 2
        wait-duration: 200ms
  circuitbreaker:
    instances:
      razorpay:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
      stripe:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
      paypal:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
      orderService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      notificationService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  timelimiter:
    instances:
      razorpay:
        timeout-duration: 10s
      stripe:
        timeout-duration: 10s
      paypal:
        timeout-duration: 10s