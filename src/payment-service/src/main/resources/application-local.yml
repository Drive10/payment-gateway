# Payment Service - Local Development Configuration
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/payflow
    username: payflow
    password: payflow
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  redis:
    host: localhost
    port: 6379
    password: payflow
    timeout: 5000ms
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: false
    consumer:
      group-id: payment-service
      properties:
        spring.json.trusted.packages: "dev.payment.*"

server:
  port: ${SERVER_PORT:8083}

application:
  profiles:
    activate: dev
  bootstrap:
    admin-email: admin@payflow.dev
    admin-password: admin123
  gateway-trust:
    enabled: false
  idempotency:
    redis-ttl-hours: 1
  expiration:
    enabled: true
    timeout: PT1M
    upi-timeout: PT30S
  webhook:
    max-retries: 1
    timeout-ms: 2000
  kafka:
    topic:
      payment-events: payment.events.local
      payment-events-dlt: payment.events.dlt.local
      payment-status-updated: payment.status.updated.local
      webhook-updates: webhook.updates.local
  simulator:
    base-url: ${SIMULATOR_SERVICE_URL:http://localhost:8086}

resilience4j:
  circuitbreaker:
    instances:
      paymentProvider:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        permitted-number-of-calls-in-half-open-state: 2
        wait-duration-in-open-state: 5s
        failure-rate-threshold: 30