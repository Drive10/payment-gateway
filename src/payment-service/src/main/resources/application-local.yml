# Local Development Profile
# Use: mvn spring-boot:run -Dspring-boot.run.profiles=local

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:payflow}
    username: ${POSTGRES_USER:payflow}
    password: ${POSTGRES_PASSWORD:payflow}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:payflow}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

payflow:
  database:
    enabled: true
  redis:
    enabled: true
  kafka:
    enabled: true
  service:
    urls:
      simulator: ${SIMULATOR_SERVICE_URL:http://localhost:8086}
      notification: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
      order: ${ORDER_SERVICE_URL:http://localhost:8082}
      auth: ${AUTH_SERVICE_URL:http://localhost:8081}

logging:
  level:
    root: INFO
    dev.payment.paymentservice: DEBUG