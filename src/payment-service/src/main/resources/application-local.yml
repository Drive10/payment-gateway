# Local development configuration - overrides application.yml

server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payflow_payment
    username: ${DB_USERNAME:payflow}
    password: ${DB_PASSWORD:payflow}
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:dev-redis-password-123}
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-service

# Disable centralized config for local dev (not compatible with current setup)
payflow:
  database:
    enabled: false
  redis:
    enabled: false
  kafka:
    enabled: false

application:
  gateway-trust:
    enabled: false
    internal-secret: dev-gateway-secret-for-local-testing-minimum-32-chars
  internal-auth:
    signing-secret: dev-internal-signing-secret-for-local-testing-minimum-32
  security:
    jwt:
      secret-key: dev-jwt-secret-key-for-local-testing-must-be-at-least-32-chars
  payment:
    default-provider: RAZORPAY_SIMULATOR
  simulator:
    base-url: http://localhost:8086
  webhook:
    service-url: http://localhost:8084

logging:
  level:
    root: INFO
    dev.payment.paymentservice: DEBUG