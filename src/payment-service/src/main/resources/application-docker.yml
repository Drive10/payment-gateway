spring:
  profiles:
    active: docker
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:payflow}
    username: ${POSTGRES_USER:payflow}
    password: ${POSTGRES_PASSWORD:payflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:payflow}

payflow:
  service:
    urls:
      simulator: ${SIMULATOR_SERVICE_URL:http://simulator-service:8086}
      notification: ${NOTIFICATION_SERVICE_URL:http://notification-service:8084}
      order: ${ORDER_SERVICE_URL:http://order-service:8082}
      auth: ${AUTH_SERVICE_URL:http://auth-service:8081}

application:
  gateway-trust:
    enabled: true
  security:
    jwt:
      secret-key: ${JWT_SECRET:payflow-dev-jwt-secret-key-256bits-minimum-for-security}
      expiration-seconds: ${JWT_EXPIRATION:86400000}
      refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION:604800000}
  payment:
    default-provider: RAZORPAY_SIMULATOR
    checkout-base-url: ${CHECKOUT_BASE_URL:http://frontend:5173}
    vpa: payflow@upi
    merchant-name: PayFlow Merchant
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    topic:
      payment-events: payment.events
      payment-events-dlt: payment.events.dlt
      payment-status-updated: payment.status.updated
      webhook-updates: webhook.updates
  outbox:
    relay-delay-ms: 2000
  idempotency:
    redis-ttl-hours: 24