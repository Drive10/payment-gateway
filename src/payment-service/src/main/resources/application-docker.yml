# Docker Profile
# Use: when running in Docker containers

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:payflow}
    username: ${POSTGRES_USER:payflow}
    password: ${POSTGRES_PASSWORD:payflow}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:payflow}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

payflow:
  database:
    enabled: true
  redis:
    enabled: true
  kafka:
    enabled: true
  service:
    urls:
      simulator: ${SIMULATOR_SERVICE_URL:http://simulator-service:8086}
      notification: ${NOTIFICATION_SERVICE_URL:http://notification-service:8084}
      order: ${ORDER_SERVICE_URL:http://order-service:8082}
      auth: ${AUTH_SERVICE_URL:http://auth-service:8081}

logging:
  level:
    root: WARN
    dev.payment.paymentservice: INFO