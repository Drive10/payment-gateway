spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: payment-service-test
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
  redis:
    host: localhost
    port: 6379

server:
  port: 8083

application:
  idempotency:
    redis-ttl-hours: 1
    db-ttl-hours: 24
  payment:
    expiration:
      enabled: false
    upi-expiration-timeout: PT5M
  simulator:
    webhook-url: http://localhost:8086/webhook
    service-url: http://localhost:8086

logging:
  level:
    root: WARN
    dev.payment: DEBUG

jwt:
  secret: test-secret-key-for-testing-purposes-only-32chars
  expiration-ms: 3600000