# Local development override
# Usage: docker compose --env-file .env up
# This file extends default config without modifying main docker-compose.yml

services:
  # Enable all profiles by default for local dev
  zookeeper:
    profiles: [infra, services]

  kafka:
    profiles: [infra, services]

  redis:
    profiles: [infra, services]

  zipkin:
    profiles: [infra, services]

  prometheus:
    profiles: [infra, services]

  loki:
    profiles: [infra, services]

  promtail:
    profiles: [infra, services]

  grafana:
    profiles: [infra, services]

  postgres:
    profiles: [infra, services]

  # Dev-specific resource limits
  api-gateway:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  auth-service:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  order-service:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  payment-service:
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M

  notification-service:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  simulator-service:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  frontend:
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M