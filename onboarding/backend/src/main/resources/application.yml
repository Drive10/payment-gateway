server:
  port: 8081

spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/payflow_db
    username: root
    password: rootpassword
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect

jwt:
  secret: payment-gateway-secret-key-must-be-at-least-256-bits-long
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
