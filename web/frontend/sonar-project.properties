# sonar-project.properties - Frontend SonarQube Configuration

sonar.projectKey=payflow_frontend
sonar.projectName=PayFlow Frontend
sonar.projectVersion=1.0.0
sonar.organization=drive10

sonar.sources=src
sonar.tests=tests
sonar.language=js

sonar.exclusions=node_modules/**,dist/**,build/**,**/*.test.js

sonar.testExecutionReportPaths=coverage/vitest-report.xml
sonar.coverageReportPaths=coverage/coverage-final.json

sonar.javascript.linting=true
sonar.javascript.maxComplexity=10
sonar.javascript.maxFunctions=20