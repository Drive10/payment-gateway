groups:
  - name: payment-gateway-slo-recording-rules
    interval: 30s
    rules:
      # =============================================================================
      # CORE PAYMENT SERVICE SLO METRICS
      # =============================================================================

      - record: slo:payment_service:availability:30d
        expr: |
          1 - (
            sum(rate(http_server_requests_seconds_count{job="payment-service",status=~"5.."}[30d]))
            /
            sum(rate(http_server_requests_seconds_count{job="payment-service"}[30d]))
          )

      - record: slo:payment_service:latency_p95:5m
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job="payment-service"}[5m])) by (le))

      - record: slo:payment_service:latency_p99:5m
        expr: |
          histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket{job="payment-service"}[5m])) by (le))

      - record: slo:payment_service:error_rate:5m
        expr: |
          sum(rate(http_server_requests_seconds_count{job="payment-service",status=~"5.."}[5m]))
          /
          sum(rate(http_server_requests_seconds_count{job="payment-service"}[5m]))

      # =============================================================================
      # API GATEWAY SLO METRICS
      # =============================================================================

      - record: slo:api_gateway:availability:30d
        expr: |
          1 - (
            sum(rate(http_server_requests_seconds_count{job="api-gateway",status=~"5.."}[30d]))
            /
            sum(rate(http_server_requests_seconds_count{job="api-gateway"}[30d]))
          )

      - record: slo:api_gateway:latency_p95:5m
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job="api-gateway"}[5m])) by (le))

      - record: slo:api_gateway:error_rate:5m
        expr: |
          sum(rate(http_server_requests_seconds_count{job="api-gateway",status=~"5.."}[5m]))
          /
          sum(rate(http_server_requests_seconds_count{job="api-gateway"}[5m]))

      # =============================================================================
      # AUTH SERVICE SLO METRICS
      # =============================================================================

      - record: slo:auth_service:login_success_rate:30d
        expr: |
          sum(rate(auth_login_success_total[30d]))
          /
          sum(rate(auth_login_total[30d]))

      - record: slo:auth_service:token_validation_latency_p95:5m
        expr: |
          histogram_quantile(0.95, sum(rate(auth_token_validation_duration_seconds_bucket[5m])) by (le))

      - record: slo:auth_service:availability:30d
        expr: |
          1 - (
            sum(rate(http_server_requests_seconds_count{job="auth-service",status=~"5.."}[30d]))
            /
            sum(rate(http_server_requests_seconds_count{job="auth-service"}[30d]))
          )

      # =============================================================================
      # RISK SERVICE SLO METRICS
      # =============================================================================

      - record: slo:risk_service:assessment_latency_p95:5m
        expr: |
          histogram_quantile(0.95, sum(rate(risk_assessment_duration_seconds_bucket[5m])) by (le))

      - record: slo:risk_service:availability:30d
        expr: |
          1 - (
            sum(rate(http_server_requests_seconds_count{job="risk-service",status=~"5.."}[30d]))
            /
            sum(rate(http_server_requests_seconds_count{job="risk-service"}[30d]))
          )

      # =============================================================================
      # BURN RATE CALCULATIONS (1h and 24h windows)
      # =============================================================================

      - record: slo:burn_rate:1h:payment_service
        expr: |
          sum(rate(http_server_requests_seconds_count{job="payment-service",status=~"5.."}[1h]))
          /
          sum(rate(http_server_requests_seconds_count{job="payment-service"}[1h]))
          /
          (0.1 / 24 / 1)  # 100% daily budget / 24 hours

      - record: slo:burn_rate:1h:api_gateway
        expr: |
          sum(rate(http_server_requests_seconds_count{job="api-gateway",status=~"5.."}[1h]))
          /
          sum(rate(http_server_requests_seconds_count{job="api-gateway"}[1h]))
          /
          (0.01 / 24 / 1)  # 100% daily budget / 24 hours

      - record: slo:burn_rate:1h:auth_service
        expr: |
          sum(rate(http_server_requests_seconds_count{job="auth-service",status=~"5.."}[1h]))
          /
          sum(rate(http_server_requests_seconds_count{job="auth-service"}[1h]))
          /
          (0.1 / 24 / 1)  # 100% daily budget / 24 hours

      - record: slo:burn_rate:1h:risk_service
        expr: |
          sum(rate(http_server_requests_seconds_count{job="risk-service",status=~"5.."}[1h]))
          /
          sum(rate(http_server_requests_seconds_count{job="risk-service"}[1h]))
          /
          (0.1 / 24 / 1)  # 100% daily budget / 24 hours

      # 24h burn rate
      - record: slo:burn_rate:24h:payment_service
        expr: |
          sum(rate(http_server_requests_seconds_count{job="payment-service",status=~"5.."}[24h]))
          /
          sum(rate(http_server_requests_seconds_count{job="payment-service"}[24h]))
          /
          0.1  # 0.1% monthly budget

      - record: slo:burn_rate:24h:api_gateway
        expr: |
          sum(rate(http_server_requests_seconds_count{job="api-gateway",status=~"5.."}[24h]))
          /
          sum(rate(http_server_requests_seconds_count{job="api-gateway"}[24h]))
          /
          0.01  # 0.01% monthly budget

      # =============================================================================
      # LATENCY PERCENTILES (Aggregated across all services)
      # =============================================================================

      - record: slo:latency_p50:5m
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, job))

      - record: slo:latency_p95:5m
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, job))

      - record: slo:latency_p99:5m
        expr: |
          histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, job))

      # =============================================================================
      # ERROR RATE BY STATUS CODE FAMILY
      # =============================================================================

      - record: slo:error_rate_4xx:5m
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"4.."}[5m])) by (job)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (job)

      - record: slo:error_rate_5xx:5m
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (job)

      # =============================================================================
      # SUCCESS RATE (The inverse of error rate)
      # =============================================================================

      - record: slo:success_rate:5m
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"2.."}[5m])) by (job)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (job)

      # =============================================================================
      # TOTAL REQUEST VOLUME (for capacity planning)
      # =============================================================================

      - record: slo:request_total:5m
        expr: |
          sum(rate(http_server_requests_seconds_count[5m])) by (job)

      - record: slo:request_total:1h
        expr: |
          sum(rate(http_server_requests_seconds_count[1h])) by (job)

      # =============================================================================
      # ERROR BUDGET REMAINING (30-day window)
      # =============================================================================

      - record: slo:budget_remaining:payment_service
        expr: |
          1 - (
            sum(rate(http_server_requests_seconds_count{job="payment-service",status=~"5.."}[30d]))
            /
            sum(rate(http_server_requests_seconds_count{job="payment-service"}[30d]))
          )
          / 0.9995  # 99.95% target

      - record: slo:budget_remaining:api_gateway
        expr: |
          1 - (
            sum(rate(http_server_requests_seconds_count{job="api-gateway",status=~"5.."}[30d]))
            /
            sum(rate(http_server_requests_seconds_count{job="api-gateway"}[30d]))
          )
          / 0.9999  # 99.99% target