groups:
  - name: payment-gateway-alerts
    interval: 30s
    rules:
      # =============================================================================
      # SERVICE AVAILABILITY ALERTS
      # =============================================================================
      
      - alert: ServiceDown
        expr: up{job=~".*-service"} == 0
        for: 1m
        labels:
          severity: critical
          category: availability
          team: platform
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute. Immediate action required."
          runbook_url: "https://runbook.example.com/service-down"

      - alert: ApiGatewayDown
        expr: up{job="api-gateway"} == 0
        for: 1m
        labels:
          severity: critical
          category: availability
          team: platform
        annotations:
          summary: "API Gateway is down"
          description: "The API Gateway has been unavailable for more than 1 minute. All incoming requests will fail."
          runbook_url: "https://runbook.example.com/api-gateway-down"

      # =============================================================================
      # HIGH ERROR RATE ALERTS
      # =============================================================================
      
      - alert: High5xxErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job)
          / 
          sum(rate(http_server_requests_seconds_count[5m])) by (job)
          > 0.01
        for: 5m
        labels:
          severity: critical
          category: errors
          team: backend
        annotations:
          summary: "High 5xx error rate for {{ $labels.job }}"
          description: "{{ $labels.job }} has a 5xx error rate above 1% for the last 5 minutes. Current rate: {{ $value | humanizePercentage }}."
          runbook_url: "https://runbook.example.com/high-5xx-rate"

      - alert: HighHttpErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"4.."}[5m])) by (job)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (job)
          > 0.10
        for: 5m
        labels:
          severity: warning
          category: errors
          team: backend
        annotations:
          summary: "High 4xx error rate for {{ $labels.job }}"
          description: "{{ $labels.job }} has a 4xx error rate above 10% for the last 5 minutes. Current rate: {{ $value | humanizePercentage }}."
          runbook_url: "https://runbook.example.com/high-4xx-rate"

      # =============================================================================
      # HIGH LATENCY ALERTS
      # =============================================================================
      
      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (job, le))
          > 2
        for: 5m
        labels:
          severity: warning
          category: latency
          team: backend
        annotations:
          summary: "High P95 latency for {{ $labels.job }}"
          description: "{{ $labels.job }} P95 latency is above 2 seconds for the last 5 minutes. Current P95: {{ $value }}s."
          runbook_url: "https://runbook.example.com/high-latency"

      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[5m])) by (job, le))
          > 5
        for: 5m
        labels:
          severity: critical
          category: latency
          team: backend
        annotations:
          summary: "Critical P99 latency for {{ $labels.job }}"
          description: "{{ $labels.job }} P99 latency is above 5 seconds for the last 5 minutes. Current P99: {{ $value }}s."
          runbook_url: "https://runbook.example.com/critical-latency"

      # =============================================================================
      # DATABASE CONNECTION POOL ALERTS
      # =============================================================================
      
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          hikaricp_connections_active / hikaricp_connections_max > 0.9
        for: 3m
        labels:
          severity: critical
          category: database
          team: backend
        annotations:
          summary: "Database connection pool near exhaustion for {{ $labels.job }}"
          description: "{{ $labels.job }} database connection pool is {{ $value | humanizePercentage }} utilized. Pool size: {{ $labels.hikaricp_connections_max }}."
          runbook_url: "https://runbook.example.com/db-pool-exhaustion"

      - alert: DatabaseConnectionPoolExhaustedCritical
        expr: |
          hikaricp_connections_active / hikaricp_connections_max >= 0.98
        for: 1m
        labels:
          severity: critical
          category: database
          team: backend
        annotations:
          summary: "Database connection pool CRITICAL for {{ $labels.job }}"
          description: "{{ $labels.job }} database connection pool is {{ $value | humanizePercentage }} utilized. New requests will be rejected."
          runbook_url: "https://runbook.example.com/db-pool-exhaustion"

      - alert: DatabaseConnectionPoolWaitHigh
        expr: |
          HikariCP_Connections_AcquireSecondsSum / HikariCP_Connections_AcquireSecondsCount > 5
        for: 5m
        labels:
          severity: warning
          category: database
          team: backend
        annotations:
          summary: "High database connection acquisition time for {{ $labels.job }}"
          description: "{{ $labels.job }} average connection acquisition time is above 5 seconds. This indicates database load or pool contention."

      # =============================================================================
      # KAFKA CONSUMER LAG ALERTS
      # =============================================================================
      
      - alert: KafkaConsumerLagHigh
        expr: |
          kafka_consumer_group_lag_sum{topic=~".*payment.*|.*order.*|.*transaction.*"}
          > 1000
        for: 5m
        labels:
          severity: warning
          category: kafka
          team: backend
        annotations:
          summary: "High Kafka consumer lag for {{ $labels.consumer_group }}"
          description: "Consumer group {{ $labels.consumer_group }} has a lag of {{ $value }} messages for topic {{ $labels.topic }}."
          runbook_url: "https://runbook.example.com/kafka-lag"

      - alert: KafkaConsumerLagCritical
        expr: |
          kafka_consumer_group_lag_sum{topic=~".*payment.*|.*order.*|.*transaction.*"}
          > 5000
        for: 5m
        labels:
          severity: critical
          category: kafka
          team: backend
        annotations:
          summary: "Critical Kafka consumer lag for {{ $labels.consumer_group }}"
          description: "Consumer group {{ $labels.consumer_group }} has a critical lag of {{ $value }} messages. Processing is significantly delayed."
          runbook_url: "https://runbook.example.com/kafka-lag"

      - alert: KafkaConsumerNotRunning
        expr: |
          kafka_consumer_group_members{topic=~".*payment.*|.*order.*|.*transaction.*"} == 0
        for: 2m
        labels:
          severity: critical
          category: kafka
          team: backend
        annotations:
          summary: "Kafka consumer not running for {{ $labels.consumer_group }}"
          description: "No active consumers in group {{ $labels.consumer_group }} for topic {{ $labels.topic }}. Messages will not be processed."

      # =============================================================================
      # PAYMENT FAILURE RATE ALERTS
      # =============================================================================
      
      - alert: PaymentFailureRateSpike
        expr: |
          sum(rate(payment_transactions_total{status="FAILED"}[5m])) by (job)
          /
          sum(rate(payment_transactions_total[5m])) by (job)
          > 0.05
        for: 5m
        labels:
          severity: critical
          category: payment
          team: payments
        annotations:
          summary: "Payment failure rate spike for {{ $labels.job }}"
          description: "{{ $labels.job }} payment failure rate is above 5% for the last 5 minutes. Current rate: {{ $value | humanizePercentage }}."
          runbook_url: "https://runbook.example.com/payment-failure-spike"

      - alert: PaymentDeclinedRateHigh
        expr: |
          sum(rate(payment_transactions_total{status="DECLINED"}[5m])) by (job)
          /
          sum(rate(payment_transactions_total[5m])) by (job)
          > 0.15
        for: 5m
        labels:
          severity: warning
          category: payment
          team: payments
        annotations:
          summary: "High payment decline rate for {{ $labels.job }}"
          description: "{{ $labels.job }} payment decline rate is above 15% for the last 5 minutes. This may indicate issues with payment processor or fraud detection."

      - alert: PaymentSuccessRateLow
        expr: |
          sum(rate(payment_transactions_total{status="SUCCESS"}[5m])) by (job)
          /
          sum(rate(payment_transactions_total[5m])) by (job)
          < 0.80
        for: 5m
        labels:
          severity: critical
          category: payment
          team: payments
        annotations:
          summary: "Low payment success rate for {{ $labels.job }}"
          description: "{{ $labels.job }} payment success rate is below 80% for the last 5 minutes. Current rate: {{ $value | humanizePercentage }}."

      # =============================================================================
      # RISK SERVICE ALERTS
      # =============================================================================
      
      - alert: RiskServiceUnavailable
        expr: up{job="risk-service"} == 0
        for: 1m
        labels:
          severity: critical
          category: availability
          team: risk
        annotations:
          summary: "Risk service is unavailable"
          description: "Risk service has been down for more than 1 minute. All risk checks will fail."
          runbook_url: "https://runbook.example.com/risk-service-down"

      - alert: RiskServiceHighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job="risk-service"}[5m])) by (le))
          > 1
        for: 5m
        labels:
          severity: warning
          category: latency
          team: risk
        annotations:
          summary: "High risk service latency"
          description: "Risk service P95 latency is above 1 second. This may cause payment processing delays."

      - alert: RiskServiceErrorRateHigh
        expr: |
          sum(rate(http_server_requests_seconds_count{job="risk-service",status=~"5.."}[5m]))
          /
          sum(rate(http_server_requests_seconds_count{job="risk-service"}[5m]))
          > 0.01
        for: 5m
        labels:
          severity: critical
          category: errors
          team: risk
        annotations:
          summary: "High error rate in risk service"
          description: "Risk service has a 5xx error rate above 1%. Risk validations may be failing."

      - alert: RiskCheckTimeoutHigh
        expr: |
          sum(rate(risk_check_timeout_total[5m])) by (job)
          /
          sum(rate(risk_check_total[5m])) by (job)
          > 0.10
        for: 5m
        labels:
          severity: warning
          category: risk
          team: risk
        annotations:
          summary: "High risk check timeout rate"
          description: "{{ $value | humanizePercentage }} of risk checks are timing out. This may indicate risk service overload."

      # =============================================================================
      # AUTH SERVICE ALERTS
      # =============================================================================
      
      - alert: AuthServiceUnavailable
        expr: up{job="auth-service"} == 0
        for: 1m
        labels:
          severity: critical
          category: availability
          team: security
        annotations:
          summary: "Auth service is unavailable"
          description: "Auth service has been down for more than 1 minute. All authentication requests will fail."
          runbook_url: "https://runbook.example.com/auth-service-down"

      - alert: AuthServiceTokenValidationFailures
        expr: |
          sum(rate(auth_token_validation_failed_total[5m])) by (job)
          > 10
        for: 5m
        labels:
          severity: warning
          category: security
          team: security
        annotations:
          summary: "High token validation failure rate in auth service"
          description: "Auth service is experiencing {{ $value }} failed token validations per second. This may indicate token theft or system issues."

      - alert: AuthServiceTokenValidationErrorsCritical
        expr: |
          sum(rate(auth_token_validation_error_total[5m])) by (job)
          > 0
        for: 2m
        labels:
          severity: critical
          category: security
          team: security
        annotations:
          summary: "Critical token validation errors in auth service"
          description: "Auth service is experiencing critical token validation errors. System integrity may be compromised."

      - alert: AuthServiceJwtVerificationFailures
        expr: |
          sum(rate(auth_jwt_verification_failed_total[5m])) by (job)
          > 5
        for: 5m
        labels:
          severity: critical
          category: security
          team: security
        annotations:
          summary: "High JWT verification failure rate"
          description: "Auth service has {{ $value }} JWT verification failures per second. This may indicate configuration issues or security threats."

      - alert: AuthServiceHighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job="auth-service"}[5m])) by (le))
          > 1
        for: 5m
        labels:
          severity: warning
          category: latency
          team: security
        annotations:
          summary: "High auth service latency"
          description: "Auth service P95 latency is above 1 second. This may cause authentication delays for users."

      - alert: AuthServiceLoginFailureRateHigh
        expr: |
          sum(rate(auth_login_failed_total[5m])) by (job)
          /
          sum(rate(auth_login_total[5m])) by (job)
          > 0.20
        for: 5m
        labels:
          severity: warning
          category: security
          team: security
        annotations:
          summary: "High login failure rate in auth service"
          description: "{{ $value | humanizePercentage }} of login attempts are failing. This may indicate brute force attacks."

      # =============================================================================
      # Jvm & Infrastructure Alerts
      # =============================================================================
      
      - alert: JvmMemoryUsageHigh
        expr: |
          jvm_memory_used_bytes{area="heap"}
          /
          jvm_memory_max_bytes{area="heap"}
          > 0.85
        for: 5m
        labels:
          severity: warning
          category: infrastructure
          team: platform
        annotations:
          summary: "High JVM memory usage for {{ $labels.job }}"
          description: "{{ $labels.job }} heap memory usage is at {{ $value | humanizePercentage }}. Consider scaling or tuning."

      - alert: JvmMemoryUsageCritical
        expr: |
          jvm_memory_used_bytes{area="heap"}
          /
          jvm_memory_max_bytes{area="heap"}
          > 0.95
        for: 2m
        labels:
          severity: critical
          category: infrastructure
          team: platform
        annotations:
          summary: "Critical JVM memory usage for {{ $labels.job }}"
          description: "{{ $labels.job }} heap memory usage is at {{ $value | humanizePercentage }}. OutOfMemoryError may occur soon."

      - alert: JvmGcPauseTimeHigh
        expr: |
          sum(rate(jvm_gc_pause_seconds_sum[5m])) by (job)
          /
          sum(rate(jvm_gc_pause_seconds_count[5m])) by (job)
          > 0.5
        for: 5m
        labels:
          severity: warning
          category: infrastructure
          team: platform
        annotations:
          summary: "High GC pause time for {{ $labels.job }}"
          description: "{{ $labels.job }} average GC pause time is {{ $value }}s. This may cause latency spikes."

      - alert: ThreadPoolExhausted
        expr: |
          tomcat_threads_config_max > 0
          and
          tomcat_threads_busy / tomcat_threads_config_max > 0.9
        for: 5m
        labels:
          severity: warning
          category: infrastructure
          team: platform
        annotations:
          summary: "Thread pool exhaustion for {{ $labels.job }}"
          description: "{{ $labels.job }} thread pool utilization is {{ $value | humanizePercentage }}."
