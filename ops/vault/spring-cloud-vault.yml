spring:
  config.import: optional:vault://

  cloud:
    vault:
      enabled: true
      host: ${VAULT_HOST:localhost}
      port: ${VAULT_PORT:8200}
      scheme: ${VAULT_SCHEME:http}
      token: ${VAULT_TOKEN:}
      namespace: ${VAULT_NAMESPACE:}
      
      kv:
        enabled: true
        default-context: application
        application-name: ${spring.application.name}
        backend: secret
        backend-version: 2
        
      database:
        enabled: true
        role: ${spring.application.name}
        
      rabbitmq:
        enabled: false
        
      ssh:
        enabled: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:paymentdb}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

logging:
  level:
    org.springframework.cloud.vault: DEBUG
    com.burgstaller: DEBUG

---

spring:
  config.import: optional:vault://

  cloud:
    vault:
      kv:
        backend: secret
        
      database:
        enabled: true

  datasource:
    url: jdbc:postgresql://postgres:5432/paymentdb
    hikari:
      maximum-pool-size: 10

---

spring:
  config.import: optional:vault://

  cloud:
    vault:
      host: vault
      port: 8200
      kv:
        backend: secret
        backend-version: 2
        
      database:
        enabled: true
        role: payment-service

      generic:
        secret:
          backend: secret
          property-source:
            - name: api-keys
              keys:
                - stripe
                - paypal

  datasource:
    url: jdbc:postgresql://postgres:5432/${DB_NAME}
    username: ${vault:database/creds/payment-service/username}
    password: ${vault:database/creds/payment-service/password}

---

spring:
  config.import: optional:vault://

  cloud:
    vault:
      host: vault
      port: 8200
      
      kv:
        enabled: true
        backend: secret
        default-context: application
        
      database:
        enabled: true
        role: payment-service
        backend: database
        
      config:
        enabled: true
        order: -1

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:paymentdb}
    username: ${vault:database/creds/payment-role/username}
    password: ${vault:database/creds/payment-role/password}