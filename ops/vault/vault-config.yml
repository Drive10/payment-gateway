listener "tcp" {
  address = "[::]:8200"
  cluster_address = "[::]:8201"
  tls_disable = "true"
}

storage "raft" {
  path = "/vault/data"
  retry_join {
    leader_api_addr = "http://vault:8200"
  }
}

service_registration "kubernetes" {}

ui = true

log_level = "INFO"

api_addr = "http://vault:8200"
cluster_addr = "http://vault:8201"

seal "kubernetes" {
  namespace = "vault"
  k8s_secret_name = "vault-unseal-keys"
  k8s_secret_namespace = "vault"
}