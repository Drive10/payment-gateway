---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  namespace: payment-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
    spec:
      containers:
        - name: config-service
          image: payment-gateway/config-service:latest
          ports:
            - containerPort: 8888
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: SPRING_CONFIG_SERVER_GIT_URI
              value: "https://github.com/example/payment-gateway-config"
            - name: SPRING_CONFIG_SERVER_GIT_DEFAULT_LABEL
              value: "main"
            - name: SPRING_SECURITY_USER_NAME
              valueFrom:
                secretKeyRef:
                  name: payment-secrets
                  key: config-server-username
            - name: SPRING_SECURITY_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-secrets
                  key: config-server-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: payment-gateway
spec:
  selector:
    app: config-service
  ports:
    - port: 8888
      targetPort: 8888
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: config-service
  namespace: payment-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: config-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: config-service
  namespace: payment-gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: config-service
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: config-service
  namespace: payment-gateway
spec:
  podSelector:
    matchLabels:
      app: config-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8888
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: payment-gateway
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432