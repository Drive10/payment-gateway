apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: payment-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: ghcr.io/example/payment-gateway-payment-service:latest
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          env:
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/paymentdb
            - name: LEDGER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: LEDGER_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: payment-platform
spec:
  selector:
    app: payment-service
  ports:
    - name: http
      port: 8084
      targetPort: 8084
