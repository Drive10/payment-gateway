---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator-service
  namespace: payment-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simulator-service
  template:
    metadata:
      labels:
        app: simulator-service
    spec:
      containers:
        - name: simulator-service
          image: payment-gateway/simulator-service:latest
          ports:
            - containerPort: 8086
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: DB_HOST
              value: "postgres.payment-gateway.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "simulatordb"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payment-secrets
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-secrets
                  key: db-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: simulator-service
  namespace: payment-gateway
spec:
  selector:
    app: simulator-service
  ports:
    - port: 8086
      targetPort: 8086
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: simulator-service
  namespace: payment-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: simulator-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: simulator-service
  namespace: payment-gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: simulator-service
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: simulator-service
  namespace: payment-gateway
spec:
  podSelector:
    matchLabels:
      app: simulator-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8086
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: payment-gateway
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              name: payment-gateway
          podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector:
            matchLabels:
              name: payment-gateway
          podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092