spring:
  application:
    name: payment-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://config-service:8888}
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

server:
  shutdown: graceful

spring.lifecycle:
  timeout-per-shutdown-phase: 30s

resilience4j:
  circuitbreaker:
    instances:
      simulator:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      riskService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 15s
        failureRateThreshold: 40
  retry:
    instances:
      simulator:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        retryExceptions:
          - java.io.IOException
  timelimiter:
    instances:
      simulator:
        timeoutDuration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  health:
    circuitbreakers:
      enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{correlationId}] [%thread] %-5level %logger{36} - %msg%n"
