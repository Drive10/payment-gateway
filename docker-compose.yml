services:
  # ============================================
  # Infrastructure Services
  # ============================================

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-payflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-payflow}
      POSTGRES_DB: ${DB_NAME:-payflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-payflow}"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-payflow_audit}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - payflow-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpassword}
    ports:
      - "6379:6379"
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 3s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 100
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 16777216
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ============================================
  # Backend Services
  # ============================================

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    image: payment-gateway-auth-service:latest
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
      CONSUL_ENABLED: "false"
      SPRING_CLOUD_CONSUL_ENABLED: "false"
      SPRING_CLOUD_CONSUL_DISCOVERY_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-payflow}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-payflow}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-payflow}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_BATCH_SIZE: 50
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      JWT_SECRET: ${JWT_SECRET:-dGhpcy1pcy1hLXZlcnktc2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1maW50ZWNoLXBheW1lbnQta2V5LWJhc2U2NC1lbmNvZGVk}
      JAVA_OPTS: "-XX:TieredStopAtLevel=1 -Xshare:on -Dspring.main.lazy-initialization=true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    image: payment-gateway-api-gateway:latest
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: docker
      SPRING_MAIN_WEB_APPLICATION_TYPE: reactive
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
      CONSUL_ENABLED: "false"
      SPRING_CLOUD_CONSUL_ENABLED: "false"
      SPRING_CLOUD_CONSUL_DISCOVERY_ENABLED: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      JWT_SECRET: ${JWT_SECRET:-dGhpcy1pcy1hLXZlcnktc2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1maW50ZWNoLXBheW1lbnQta2V5LWJhc2U2NC1lbmNvZGVk}
      APPLICATION_GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET:-internal-gateway-secret}
      JAVA_OPTS: "-XX:TieredStopAtLevel=1 -Xshare:on"
      EUREKA_ENABLED: "false"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    image: payment-gateway-payment-service:latest
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: "8083"
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-XX:TieredStopAtLevel=1 -Xshare:on -Dspring.main.lazy-initialization=true"
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-payflow}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-payflow}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-payflow}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_BATCH_SIZE: 50
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      JWT_SECRET: ${JWT_SECRET:-dGhpcy1pcy1hLXZlcnktc2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1maW50ZWNoLXBheW1lbnQta2V5LWJhc2U2NC1lbmNvZGVk}
      VAULT_ENABLED: "false"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APPLICATION_GATEWAY_TRUST_ENABLED: "false"
      APPLICATION_GATEWAY_TRUST_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET:-internal-gateway-secret}
      CONSUL_ENABLED: "false"
      SPRING_CLOUD_CONSUL_ENABLED: "false"
      SPRING_CLOUD_CONSUL_DISCOVERY_ENABLED: "false"
      SIMULATOR_SERVICE_URL: http://simulator-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      ORDER_SERVICE_URL: http://order-service:8084
      AUTH_SERVICE_URL: http://auth-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    image: payment-gateway-order-service:latest
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: "8084"
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-XX:TieredStopAtLevel=1 -Xshare:on -Dspring.main.lazy-initialization=true"
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-payflow}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-payflow}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-payflow}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_BATCH_SIZE: 50
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      VAULT_ENABLED: "false"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CONSUL_ENABLED: "false"
      SPRING_CLOUD_CONSUL_ENABLED: "false"
      SPRING_CLOUD_CONSUL_DISCOVERY_ENABLED: "false"
      APPLICATION_PAYMENT_SERVICE_URL: http://payment-service:8083
      APPLICATION_NOTIFICATION_SERVICE_URL: http://notification-service:8085
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    image: payment-gateway-notification-service:latest
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: "8085"
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-XX:TieredStopAtLevel=1 -Xshare:on -Dspring.main.lazy-initialization=true"
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-payflow}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-payflow}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-payflow}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_BATCH_SIZE: 50
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      REDIS_HOST: redis
      VAULT_ENABLED: "false"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CONSUL_ENABLED: "false"
      SPRING_CLOUD_CONSUL_ENABLED: "false"
      SPRING_CLOUD_CONSUL_DISCOVERY_ENABLED: "false"
      APPLICATION_PAYMENT_SERVICE_URL: http://payment-service:8083
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    image: payment-gateway-analytics-service:latest
    ports:
      - "8089:8089"
    environment:
      SERVER_PORT: "8089"
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-payflow}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-payflow}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-payflow}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_BATCH_SIZE: 50
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      REDIS_HOST: redis
      VAULT_ENABLED: "false"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CONSUL_ENABLED: "false"
      SPRING_CLOUD_CONSUL_ENABLED: "false"
      SPRING_CLOUD_CONSUL_DISCOVERY_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8089/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  simulator-service:
    build:
      context: .
      dockerfile: services/simulator-service/Dockerfile
    image: payment-gateway-simulator-service:latest
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: "8086"
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    depends_on: []
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  audit-service:
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    image: payment-gateway-audit-service:latest
    ports:
      - "8088:8088"
    environment:
      SERVER_PORT: "8088"
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
      MONGODB_URI: mongodb://mongodb:27017/audit_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # Frontend
  # ============================================

  frontend:
    build:
      context: ./web/frontend
      dockerfile: Dockerfile
    image: payment-gateway-frontend:latest
    ports:
      - "3000:80"
    networks:
      - payflow-network
    depends_on:
      api-gateway:
        condition: service_healthy
      auth-service:
        condition: service_healthy

networks:
  payflow-network:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
