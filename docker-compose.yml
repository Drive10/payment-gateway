services:
  redis:
    profiles: [ "services", "infra" ]
    image: redis:7.4-alpine
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    ports:
      - "6379:6379"
    networks:
      - fintech-network

  kafka:
    profiles: [ "services", "infra" ]
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    networks:
      - fintech-network

  postgres:
    profiles: [ "services", "infra" ]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: paymentpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U payment" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fintech-network


  api-gateway:
    profiles: [ "services" ]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      JWT_SECRET_B64: ${JWT_SECRET_B64:-dGhpcy1pcy1hLXZlcnktc2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1maW50ZWNo}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET:-dev-gateway-internal-secret}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      AUTH_SERVICE_URL: http://payment-service:8084
      LEDGER_SERVICE_URL: http://payment-service:8084
      PAYMENT_SERVICE_URL: http://payment-service:8084

    ports:
      - "8080:8080"
    volumes:
      - ./config:/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    networks:
      - fintech-network

  payment-service:
    profiles: [ "services" ]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/payment-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8084
      JWT_SECRET_B64: ${JWT_SECRET_B64:-dGhpcy1pcy1hLXZlcnktc2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1maW50ZWNo}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET:-dev-gateway-internal-secret}
      DB_URL: jdbc:postgresql://postgres:5432/paymentdb
      DB_USERNAME: payment
      DB_PASSWORD: paymentpass
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SIMULATOR_BASE_URL: http://simulator-service:8085
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:8084/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    networks:
      - fintech-network

  simulator-service:
    profiles: [ "services" ]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/simulator-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8085
      DB_URL: jdbc:postgresql://postgres:5432/paymentdb
      DB_USERNAME: payment
      DB_PASSWORD: paymentpass
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:8085/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - fintech-network

  frontend:
    profiles: [ "services" ]
    build:
      context: ./services/frontend
    ports:
      - "3000:80"
    networks:
      - fintech-network

volumes:
  postgres_data:

networks:
  fintech-network:
    name: fintech-network