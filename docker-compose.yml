name: payflow
services:
  # Infrastructure - Shared
  zookeeper:
    profiles: [infra, services]
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - payflow-network

  kafka:
    profiles: [infra, services]
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - payflow-network

  redis:
    profiles: [infra, services]
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-payflow-redis}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "payflow-redis", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 3s
    networks:
      - payflow-network

  zipkin:
    profiles: [infra, services]
    image: openzipkin/zipkin:3.4
    ports:
      - "9411:9411"
    networks:
      - payflow-network

  # Prometheus for metrics
  prometheus:
    profiles: [infra, services]
    image: prom/prometheus:v2.50.1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - payflow-network

  # Loki for logs
  loki:
    profiles: [infra, services]
    image: grafana/loki:2.9.5
    container_name: payflow-loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - payflow-network

  # Promtail for log shipping to Loki
  promtail:
    profiles: [infra, services]
    image: grafana/promtail:2.9.5
    container_name: payflow-promtail
    volumes:
      - ./infra/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - payflow-network

  # Grafana for metrics & logs visualization
  grafana:
    profiles: [infra, services]
    image: grafana/grafana:11.0.0
    container_name: payflow-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_FEATURE_TOGGLES_ENABLE=lokiLogging
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - payflow-network

  # PostgreSQL - Single instance with multiple databases
  postgres:
    profiles: [infra, services]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-payflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-payflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payflow"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 5s
    networks:
      - payflow-network

  # API Gateway (No DB)
  api-gateway:
    profiles: [services]
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: payflow-api-gateway
    ports:
      - "8080:8080"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-payflow-redis}
      - JWT_SECRET=${JWT_SECRET:-ZGV2LW9ubHktand0LXNlY3JldC1jaGFuZ2UtbWUtcGxlYXNlLWNoYW5nZS1pbi1wcm9kdWN0aW9uLTIwMjYtcGF5Zmxvdw==}
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET:-dev-only-gateway-secret-change-me}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - payflow-network

  # Auth Service
  auth-service:
    profiles: [services]
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: payflow-auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/payflow_auth
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-payflow}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-payflow}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-payflow-redis}
      - JWT_SECRET=${JWT_SECRET:-ZGV2LW9ubHktand0LXNlY3JldC1jaGFuZ2UtbWUtcGxlYXNlLWNoYW5nZS1pbi1wcm9kdWN0aW9uLTIwMjYtcGF5Zmxvdw==}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - payflow-network

  # Order Service
  order-service:
    profiles: [services]
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: payflow-order-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/payflow_order
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-payflow}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-payflow}
      - JWT_SECRET=${JWT_SECRET:-ZGV2LW9ubHktand0LXNlY3JldC1jaGFuZ2UtbWUtcGxlYXNlLWNoYW5nZS1pbi1wcm9kdWN0aW9uLTIwMjYtcGF5Zmxvdw==}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - payflow-network

  # Payment Service
  payment-service:
    profiles: [services]
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: payflow-payment-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/payflow_payment
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-payflow}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-payflow}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-payflow-redis}
      - JWT_SECRET=${JWT_SECRET:-ZGV2LW9ubHktand0LXNlY3JldC1jaGFuZ2UtbWUtcGxlYXNlLWNoYW5nZS1pbi1wcm9kdWN0aW9uLTIwMjYtcGF5Zmxvdw==}
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET:-dev-only-gateway-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - payflow-network

  # Notification Service
  notification-service:
    profiles: [services]
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: payflow-notification-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/payflow_notification
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-payflow}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-payflow}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-payflow-redis}

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - payflow-network

  # Simulator Service
  simulator-service:
    profiles: [services]
    build:
      context: .
      dockerfile: services/simulator-service/Dockerfile
    container_name: payflow-simulator-service
    ports:
      - "8086:8086"
    networks:
      - payflow-network

  # Frontend
  frontend:
    profiles: [services]
    build:
      context: ./web/payment-page
      dockerfile: Dockerfile
    container_name: payflow-frontend
    environment:
      - VITE_API_BASE_URL=http://api-gateway:8080
    depends_on:
      - api-gateway
    ports:
      - "5173:80"
    networks:
      - payflow-network

volumes:
  postgres_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  payflow-network:
    driver: bridge
