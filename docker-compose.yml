      POSTGRES_HOST: postgres
      ORDER_DB: orderdb
      ORDER_DB_USER: ${ORDER_DB_USER}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_SERVICE_URL: http://payment-service:8083
    ports:
      - "8082:8082"
    restart: unless-stopped
    deploy:
