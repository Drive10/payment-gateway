services:
  redis:
    profiles: ["services", "infra"]
    image: redis:7.4-alpine
    container_name: fintech-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"

  kafka:
    profiles: ["services", "infra"]
    image: apache/kafka:3.8.0
    container_name: fintech-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"

  postgres:
    profiles: ["services", "infra"]
    image: postgres:16-alpine
    container_name: fintech-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-platform}
      POSTGRES_USER: ${POSTGRES_USER:-payment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payment} -d ${POSTGRES_DB:-platform}"]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-service:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-service
    environment:
      SPRING_PROFILES_ACTIVE: ${PAYMENT_SERVICE_PROFILE:-stage}
      SERVER_PORT: 8084
      DB_URL: ${PAYMENT_DB_URL:-jdbc:postgresql://postgres:5432/paymentdb}
      DB_USERNAME: ${POSTGRES_USER:-payment}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-RAZORPAY_SIMULATOR}
      CHECKOUT_BASE_URL: ${CHECKOUT_BASE_URL:-http://frontend}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      PAYMENT_EVENTS_TOPIC: ${PAYMENT_EVENTS_TOPIC:-payment.events}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-dev_webhook_secret}
      SIMULATOR_SERVICE_URL: ${SIMULATOR_SERVICE_URL:-http://simulator-service:8087}
      LEDGER_SERVICE_URL: ${LEDGER_SERVICE_URL:-http://ledger-service:8082}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/api-gateway
    container_name: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: ${API_GATEWAY_PROFILE:-stage}
      SERVER_PORT: 8080
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://payment-service:8084}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8081}
      LEDGER_SERVICE_URL: ${LEDGER_SERVICE_URL:-http://ledger-service:8082}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:8083}
      RISK_SERVICE_URL: ${RISK_SERVICE_URL:-http://risk-service:8085}
      SETTLEMENT_SERVICE_URL: ${SETTLEMENT_SERVICE_URL:-http://settlement-service:8086}
      SIMULATOR_SERVICE_URL: ${SIMULATOR_SERVICE_URL:-http://simulator-service:8087}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_started

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      - api-gateway
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  auth-service:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/auth-service
    container_name: auth-service
    environment:
      SPRING_PROFILES_ACTIVE: ${AUTH_SERVICE_PROFILE:-stage}
      SERVER_PORT: 8081
      AUTH_DB_URL: ${AUTH_DB_URL:-jdbc:postgresql://postgres:5432/authdb}
      DB_USERNAME: ${POSTGRES_USER:-payment}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  ledger-service:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/ledger-service
    container_name: ledger-service
    environment:
      SPRING_PROFILES_ACTIVE: ${LEDGER_SERVICE_PROFILE:-stage}
      SERVER_PORT: 8082
      LEDGER_DB_URL: ${LEDGER_DB_URL:-jdbc:postgresql://postgres:5432/ledgerdb}
      DB_USERNAME: ${POSTGRES_USER:-payment}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/notification-service
    container_name: notification-service
    environment:
      SPRING_PROFILES_ACTIVE: ${NOTIFICATION_SERVICE_PROFILE:-stage}
      SERVER_PORT: 8083
      NOTIFICATION_DB_URL: ${NOTIFICATION_DB_URL:-jdbc:postgresql://postgres:5432/notificationdb}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      PAYMENT_EVENTS_TOPIC: ${PAYMENT_EVENTS_TOPIC:-payment.events}
      PAYMENT_EVENTS_DLT_TOPIC: ${PAYMENT_EVENTS_DLT_TOPIC:-payment.events.dlt}
      DB_USERNAME: ${POSTGRES_USER:-payment}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  risk-service:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/risk-service
    container_name: risk-service
    environment:
      SPRING_PROFILES_ACTIVE: ${RISK_SERVICE_PROFILE:-stage}
      SERVER_PORT: 8085
      RISK_DB_URL: ${RISK_DB_URL:-jdbc:postgresql://postgres:5432/riskdb}
      DB_USERNAME: ${POSTGRES_USER:-payment}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy

  settlement-service:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/settlement-service
    container_name: settlement-service
    environment:
      SPRING_PROFILES_ACTIVE: ${SETTLEMENT_SERVICE_PROFILE:-stage}
      SERVER_PORT: 8086
      SETTLEMENT_DB_URL: ${SETTLEMENT_DB_URL:-jdbc:postgresql://postgres:5432/settlementdb}
      DB_USERNAME: ${POSTGRES_USER:-payment}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy

  simulator-service:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/simulator-service
    container_name: simulator-service
    environment:
      SPRING_PROFILES_ACTIVE: ${SIMULATOR_SERVICE_PROFILE:-stage}
      SERVER_PORT: 8087
      SIMULATOR_DB_URL: ${SIMULATOR_DB_URL:-jdbc:postgresql://postgres:5432/simulatordb}
      DB_USERNAME: ${POSTGRES_USER:-payment}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    profiles: ["services"]
    image: prom/prometheus:v2.54.1
    container_name: fintech-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    profiles: ["services"]
    image: grafana/grafana:11.1.4
    container_name: fintech-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro

  zipkin:
    profiles: ["services"]
    image: openzipkin/zipkin:3.4
    container_name: fintech-zipkin
    ports:
      - "${ZIPKIN_PORT:-9411}:9411"

volumes:
  postgres_data:
