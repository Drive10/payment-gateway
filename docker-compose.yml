version: "3.9"

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - pgw-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - pgw-net

  postgres:
    image: postgres:16
    container_name: payment-postgres
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: paymentpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pgw-net

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - pgw-net

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    networks:
      - pgw-net

  otel-collector:
    image: otel/opentelemetry-collector:0.104.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"
      - "9464:9464"
    networks:
      - pgw-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus:/etc/prometheus
    networks:
      - pgw-net

  grafana:
    image: grafana/grafana:10.4.6
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - pgw-net

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/api-gateway
    container_name: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - pgw-net

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/auth-service
    container_name: auth-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8080"
    restart: unless-stopped
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - pgw-net

  ledger-service:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/ledger-service
    container_name: ledger-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8082:8080"
    restart: unless-stopped
    depends_on:
      - postgres
      - kafka
    networks:
      - pgw-net

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/notification-service
    container_name: notification-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8083:8080"
    restart: unless-stopped
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - pgw-net

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/payment-service
    container_name: payment-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8084:8080"
    restart: unless-stopped
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - pgw-net

  risk-service:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/risk-service
    container_name: risk-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8085:8080"
    restart: unless-stopped
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - pgw-net

  settlement-service:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/settlement-service
    container_name: settlement-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8086:8080"
    restart: unless-stopped
    depends_on:
      - postgres
      - kafka
    networks:
      - pgw-net

networks:
  pgw-net:
    driver: bridge

volumes:
  pgdata:
  redisdata: