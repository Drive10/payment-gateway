    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/merchant-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8090
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: merchantdb
      DB_USERNAME: ${MERCHANT_DB_USER}
      DB_PASSWORD: ${MERCHANT_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8090:8090"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8090/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    networks:
      - fintech-network

  dispute-service:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/dispute-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8091
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: disputedb
      DB_USERNAME: ${DISPUTE_DB_USER}
      DB_PASSWORD: ${DISPUTE_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8091:8091"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8091/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    networks:
      - fintech-network

  api-gateway:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      JWT_SECRET_B64: ${JWT_SECRET_B64}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AUTH_SERVICE_URL: http://auth-service:8081
      ORDER_SERVICE_URL: http://order-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      MERCHANT_SERVICE_URL: http://merchant-service:8090
      DISPUTE_SERVICE_URL: http://dispute-service:8091
    ports:
      - "8080:8080"
    volumes:
      - ./config:/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.75"
    depends_on:
      auth-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      merchant-service:
        condition: service_healthy
      dispute-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    networks:
      - fintech-network

  # Frontend - build only, static files served by reverse-proxy
  frontend:
    profiles: ["services"]
    build:
      context: ./services/frontend
      target: builder
    volumes:
      - ./services/frontend/dist:/app/dist
    networks:
      - fintech-network

  # Dashboard - build only, static files served by reverse-proxy
  dashboard:
    profiles: ["services"]
    build:
      context: ./services/dashboard
      target: builder
    environment:
      VITE_API_URL: /api/v1
    volumes:
      - ./services/dashboard/dist:/app/dist
    networks:
      - fintech-network

  # Unified Nginx reverse-proxy - serves all frontends + routes API
  reverse-proxy:
    profiles: ["services"]
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./services/frontend/dist:/usr/share/nginx/html/frontend:ro
      - ./services/dashboard/dist:/usr/share/nginx/html/dashboard:ro
    depends_on:
      - api-gateway
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    networks:
      - fintech-network

networks:
  fintech-network:
    name: fintech-network
