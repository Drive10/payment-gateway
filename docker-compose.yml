services:
  # ==================== INFRASTRUCTURE SERVICES ====================
  postgres:
    image: postgres:16-alpine
    container_name: payflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payflow}
      POSTGRES_USER: ${POSTGRES_USER:-payflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payflow-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-payflow}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "payflow", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: payflow-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:29092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: b9H8-t06Q4SvTyaHU8Nf9w
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== APPLICATION SERVICES ====================
  api-gateway:
    image: payflow-api-gateway:local
    container_name: payflow-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "docker"
      AUTH_SERVICE_URL: "http://auth-service:8082"
      PAYMENT_SERVICE_URL: "http://payment-service:8083"
      JWT_SECRET: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    networks:
      - payflow-network
    depends_on:
      kafka:
        condition: service_healthy

  auth-service:
    image: payflow-auth-service:local
    container_name: payflow-auth-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: "docker"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "payflow"
      POSTGRES_USER: "payflow"
      POSTGRES_PASSWORD: "payflow"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "payflow"
      JWT_SECRET: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    networks:
      - payflow-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment-service:
    image: payflow-payment-service:local
    container_name: payflow-payment-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: "docker"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "payflow"
      POSTGRES_USER: "payflow"
      POSTGRES_PASSWORD: "payflow"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "payflow"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      SIMULATOR_SERVICE_URL: "http://simulator-service:8086"
    networks:
      - payflow-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  simulator-service:
    image: payflow-simulator-service:local
    container_name: payflow-simulator-service
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: "docker"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
    networks:
      - payflow-network
    depends_on:
      kafka:
        condition: service_healthy

networks:
  payflow-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data: