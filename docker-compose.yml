services:
  # Default environment variables with sensible defaults for development
  x-defaults: &defaults
    SPRING_PROFILES_ACTIVE: docker

  vault:
    <<: *defaults
    profiles: ["services", "infra"]
    image: hashicorp/vault:1.17
    container_name: vault
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN}
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN}
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
    networks:
      - fintech-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8200/v1/sys/health?standbyok=true"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *defaults
    profiles: ["services", "infra", "observability"]
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    networks:
      - fintech-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  config-service:
    <<: *defaults
    profiles: ["services", "infra"]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/config-service
    environment:
      SERVER_PORT: 8888
      CONFIG_GIT_URI: ${CONFIG_GIT_URI}
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fintech-network

  kafka:
    profiles: ["services", "infra"]
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_DLQ_TOPIC_SUFFIX: .DLQ
      KAFKA_TRANSACTION_MAX_TIMEOUT_MS: 900000
    ports:
      - "9092:9092"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.00"
    networks:
      - fintech-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  postgres:
    profiles: ["services", "infra"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: authdb,orderdb,paymentdb,notificationdb,webhookdb,simulatordb,settlementdb,riskdb,analyticsdb,merchantdb,disputedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.00"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fintech-network

  auth-service:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/auth-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      JWT_SECRET_B64: ${JWT_SECRET_B64}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: authdb
      DB_USERNAME: ${AUTH_DB_USER}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "8081:8081"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "0.75"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    networks:
      - fintech-network

