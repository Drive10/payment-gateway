version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: payflow_db
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - payflow-network

  mongodb:
    image: mongo:7
    environment:
      MONGO_INIT_DATABASE: payflow_gateway
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - payflow-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - payflow-network

volumes:
  mariadb_data:
  mongodb_data:

networks:
  payflow-network:
    driver: bridge