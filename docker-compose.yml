services:
  postgres:
    image: postgres:16-alpine
    container_name: fintech-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-paymentdb}
      POSTGRES_USER: ${POSTGRES_USER:-payment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payment} -d ${POSTGRES_DB:-paymentdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-service:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8084
      DB_USERNAME: ${POSTGRES_USER:-payment}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-VGhpc0lzQVN0cm9uZ0Jhc2U2NEVuY29kZWRKU1dUU2VjcmV0S2V5Rm9yRmluVGVjaEFQSUM=}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-RAZORPAY_SIMULATOR}
      CHECKOUT_BASE_URL: ${CHECKOUT_BASE_URL:-https://checkout.fintech.local}
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/api-gateway
    container_name: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      - api-gateway
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  auth-service:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/auth-service
    container_name: auth-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      DB_USERNAME: ${POSTGRES_USER:-payment}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  ledger-service:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/ledger-service
    container_name: ledger-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
      DB_USERNAME: ${POSTGRES_USER:-payment}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/notification-service
    container_name: notification-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8083
      DB_USERNAME: ${POSTGRES_USER:-payment}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy

  risk-service:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/risk-service
    container_name: risk-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8085
      DB_USERNAME: ${POSTGRES_USER:-payment}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy

  settlement-service:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/settlement-service
    container_name: settlement-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8086
      DB_USERNAME: ${POSTGRES_USER:-payment}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
