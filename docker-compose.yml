      SERVER_PORT: 8089
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: analyticsdb
      DB_USERNAME: ${ANALYTICS_DB_USER}
      DB_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8089:8089"
    restart: unless-stopped
    deploy:
