services:
  redis:
    profiles: [ "services", "infra" ]
    image: redis:7.4-alpine
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    ports:
      - "6379:6379"
    networks:
      - fintech-network

  kafka:
    profiles: [ "services", "infra" ]
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    networks:
      - fintech-network

  postgres:
    profiles: [ "services", "infra" ]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: paymentpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - fintech-network


  api-gateway:
    profiles: [ "services" ]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080

      REDIS_HOST: redis
      REDIS_PORT: 6379

      AUTH_SERVICE_URL: http://auth-service:8081
      LEDGER_SERVICE_URL: http://ledger-service:8082

      PAYMENT_SERVICE_URL: http://host.docker.internal:8084

    ports:
      - "8080:8080"
    volumes:
      - ./config:/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    networks:
      - fintech-network

  auth-service:
    profiles: [ "services" ]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/auth-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      AUTH_DB_URL: jdbc:postgresql://postgres:5432/authdb
      DB_USERNAME: payment
      DB_PASSWORD: paymentpass
    networks:
      - fintech-network

  ledger-service:
    profiles: [ "services" ]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/ledger-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
      LEDGER_DB_URL: jdbc:postgresql://postgres:5432/ledgerdb
      DB_USERNAME: payment
      DB_PASSWORD: paymentpass
    networks:
      - fintech-network

  payment-service:
    profiles: [ "full" ]
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/payment-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8084
      DB_URL: jdbc:postgresql://postgres:5432/paymentdb
      DB_USERNAME: payment
      DB_PASSWORD: paymentpass
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - fintech-network

  frontend:
    profiles: [ "services" ]
    build:
      context: ./services/frontend
    ports:
      - "3000:80"
    networks:
      - fintech-network

volumes:
  postgres_data:

networks:
  fintech-network:
    name: fintech-network