services:
  postgres:
    image: postgres:16-alpine
    container_name: fintech-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-paymentdb}
      POSTGRES_USER: ${POSTGRES_USER:-payment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payment} -d ${POSTGRES_DB:-paymentdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-service
    environment:
      SERVER_PORT: 8084
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-paymentdb}
      DB_USERNAME: ${POSTGRES_USER:-payment}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-paymentpass}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-VGhpc0lzQVN0cm9uZ0Jhc2U2NEVuY29kZWRKU1dUU2VjcmV0S2V5Rm9yRmluVGVjaEFQSUM=}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-RAZORPAY_SIMULATOR}
      CHECKOUT_BASE_URL: ${CHECKOUT_BASE_URL:-https://checkout.fintech.local}
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/api-gateway
    container_name: api-gateway
    environment:
      SERVER_PORT: 8080
      PAYMENT_SERVICE_URL: http://payment-service:8084
      AUTH_SERVICE_URL: http://auth-service:8081
      LEDGER_SERVICE_URL: http://ledger-service:8082
      NOTIFICATION_SERVICE_URL: http://notification-service:8083
      RISK_SERVICE_URL: http://risk-service:8085
      SETTLEMENT_SERVICE_URL: http://settlement-service:8086
    ports:
      - "8080:8080"
    depends_on:
      - payment-service
      - auth-service
      - ledger-service
      - notification-service
      - risk-service
      - settlement-service

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/auth-service
    container_name: auth-service
    environment:
      SERVER_PORT: 8081
    ports:
      - "8081:8081"

  ledger-service:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/ledger-service
    container_name: ledger-service
    environment:
      SERVER_PORT: 8082
    ports:
      - "8082:8082"

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/notification-service
    container_name: notification-service
    environment:
      SERVER_PORT: 8083
    ports:
      - "8083:8083"

  risk-service:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/risk-service
    container_name: risk-service
    environment:
      SERVER_PORT: 8085
    ports:
      - "8085:8085"

  settlement-service:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/settlement-service
    container_name: settlement-service
    environment:
      SERVER_PORT: 8086
    ports:
      - "8086:8086"

volumes:
  postgres_data:
