name: payflow
services:
  # Infrastructure - Shared
  zookeeper:
    profiles: [infra, services]
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - payflow-network

  kafka:
    profiles: [infra, services]
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - payflow-network

  redis:
    profiles: [infra, services]
    image: redis:7-alpine
    command: redis-server --requirepass payflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "payflow-redis", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 3s
    networks:
      - payflow-network

  zipkin:
    profiles: [infra, services]
    image: openzipkin/zipkin:3.4
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9411/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # PostgreSQL - Single instance with multiple databases
  postgres:
    profiles: [infra, services]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: payflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payflow"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 5s
    networks:
      - payflow-network

  # MongoDB - Single instance with multiple databases
  mongodb:
    profiles: [infra, services]
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_DATABASE: admin
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 5s
    networks:
      - payflow-network

  # API Gateway (No DB)
  api-gateway:
    profiles: [services]
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: payflow-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - payflow-network

  # Auth Service
  auth-service:
    profiles: [services]
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: payflow-auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/payflow_auth
      - SPRING_DATASOURCE_USERNAME=payflow
      - SPRING_DATASOURCE_PASSWORD=payflow
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - payflow-network

  # Order Service
  order-service:
    profiles: [services]
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: payflow-order-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/payflow_order
      - SPRING_DATASOURCE_USERNAME=payflow
      - SPRING_DATASOURCE_PASSWORD=payflow
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - payflow-network

  # Payment Service
  payment-service:
    profiles: [services]
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: payflow-payment-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/payflow_payment
      - SPRING_DATASOURCE_USERNAME=payflow
      - SPRING_DATASOURCE_PASSWORD=payflow
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PASSWORD=payflow-redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - payflow-network

  # Notification Service
  notification-service:
    profiles: [services]
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: payflow-notification-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/payflow_notification
      - SPRING_DATASOURCE_USERNAME=payflow
      - SPRING_DATASOURCE_PASSWORD=payflow
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - payflow-network

  # Simulator Service
  simulator-service:
    profiles: [services]
    build:
      context: .
      dockerfile: services/simulator-service/Dockerfile
    container_name: payflow-simulator-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/payflow_simulator
      - SPRING_DATASOURCE_USERNAME=payflow
      - SPRING_DATASOURCE_PASSWORD=payflow
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - payflow-network

  # Analytics Service
  analytics-service:
    profiles: [services]
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: payflow-analytics-service
    ports:
      - "8089:8089"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/payflow_analytics
      - SPRING_DATASOURCE_USERNAME=payflow
      - SPRING_DATASOURCE_PASSWORD=payflow
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - payflow-network

  # Audit Service
  audit-service:
    profiles: [services]
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    container_name: payflow-audit-service
    ports:
      - "8090:8090"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://payflow:payflow@mongodb:27017/payflow_audit?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - payflow-network

  # Frontend
  frontend:
    profiles: [services]
    build:
      context: ./web/payment-page
      dockerfile: Dockerfile
    container_name: payflow-frontend
    environment:
      - VITE_API_BASE_URL=http://api-gateway:8080
    depends_on:
      - api-gateway
    ports:
      - "5173:5173"
    networks:
      - payflow-network

volumes:
  postgres_data:
  mongodb_data:

networks:
  payflow-network:
    driver: bridge