services:
  vault:
    profiles: ["services", "infra"]
    image: hashicorp/vault:1.15
    container_name: vault
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    command: server -dev
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8200/v1/sys/health || exit 1"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    networks:
      - fintech-network
  redis:
    profiles: ["services", "infra", "observability"]
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --tls-port 6380
      --port 0
      --tls-cert-file /etc/redis/tls/redis.crt
      --tls-key-file /etc/redis/tls/redis.key
      --tls-ca-cert-file /etc/redis/tls/ca.crt
      --save ""
      --appendonly no
    volumes:
      - redis_data:/data
      - ./docker/redis/tls:/etc/redis/tls:ro
    ports:
      - "6379:6379"
      - "6380:6380"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    networks:
      - fintech-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    profiles: ["services", "infra"]
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:SSL,INTERNAL:SSL,EXTERNAL:SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_DLQ_TOPIC_SUFFIX: .DLQ
      KAFKA_TRANSACTION_MAX_TIMEOUT_MS: 900000
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.00"
    networks:
      - fintech-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  postgres:
    profiles: ["services", "infra"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: authdb,orderdb,paymentdb,notificationdb,webhookdb,simulatordb,settlementdb,riskdb,analyticsdb,merchantdb,disputedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.00"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fintech-network

  auth-service:
    profiles: ["services"]
    depends_on:
      vault:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/auth-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-dev-root-token}
      VAULT_ADDR: http://vault:8200
      VAULT_ENABLED: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: authdb
      DB_USERNAME: ${AUTH_DB_USER}
      DB_PASSWORD: ${DB_PASSWORD_AUTH:-authpass}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8081:8081"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "0.75"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - fintech-network

  order-service:
    profiles: ["services"]
    depends_on:
      vault:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/order-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-dev-root-token}
      VAULT_ADDR: http://vault:8200
      VAULT_ENABLED: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: orderdb
      DB_USERNAME: payment
      DB_PASSWORD: ${DB_PASSWORD_ORDER:-paymentpass}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://payment-service:8083}
    ports:
      - "8082:8082"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "0.75"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - fintech-network

  payment-service:
    profiles: ["services"]
    depends_on:
      vault:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/payment-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8083
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-dev-root-token}
      VAULT_ADDR: http://vault:8200
      VAULT_ENABLED: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: paymentdb
      DB_USERNAME: ${PAYMENT_DB_USER}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SIMULATOR_SERVICE_URL: http://simulator-service:8086
      SIMULATOR_BASE_URL: http://simulator-service:8086
      ORDER_SERVICE_URL: http://order-service:8082
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
      JAVA_OPTS: "-XX:+UseZGC -XX:MaxRAMPercentage=75.0 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/heapdump.hprof -Djava.security.egd=file:/dev/./urandom"
    ports:
      - "8083:8083"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "0.75"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - fintech-network

  notification-service:
    profiles: ["services"]
    depends_on:
      vault:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/notification-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8084
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-dev-root-token}
      VAULT_ADDR: http://vault:8200
      VAULT_ENABLED: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: notificationdb
      DB_USERNAME: ${NOTIFICATION_DB_USER}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8084:8084"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "0.75"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8084/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - fintech-network

  simulator-service:
    profiles: ["services"]
    depends_on:
      vault:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/simulator-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8086
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-dev-root-token}
      VAULT_ADDR: http://vault:8200
      VAULT_ENABLED: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: simulatordb
      DB_USERNAME: ${SIMULATOR_DB_USER}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8086:8086"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8086/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - fintech-network

  analytics-service:
    profiles: ["services"]
    depends_on:
      vault:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/analytics-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8089
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-dev-root-token}
      VAULT_ADDR: http://vault:8200
      VAULT_ENABLED: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: analyticsdb
      DB_USERNAME: ${ANALYTICS_DB_USER}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8089:8089"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8089/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - fintech-network

  api-gateway:
    profiles: ["services"]
    depends_on:
      vault:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-dev-root-token}
      VAULT_ADDR: http://vault:8200
      VAULT_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8081}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL:-http://order-service:8082}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://payment-service:8083}
  # Frontend - build only, static files served by reverse-proxy
  frontend:
    profiles: ["services"]
    build:
      context: ./web/frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    networks:
      - fintech-network

  dashboard:
    profiles: ["services"]
    build:
      context: ./web/dashboard
    ports:
      - "3001:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    networks:
      - fintech-network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  vault_data:
  kafka_data:
  redis_data:

networks:
  fintech-network:
    name: fintech-network

---
# Observability Stack
services:
  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    networks:
      - fintech-network

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:10.4.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3002:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    networks:
      - fintech-network
