server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: ${spring.application.name}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}

# PayFlow Centralized Configuration
payflow:
  database:
    enabled: ${PAYFLOW_DATABASE_ENABLED:true}
    host: ${DB_HOST:postgres}
    port: ${DB_PORT:5432}
    username: ${DB_USERNAME:payflow}
    password: ${DB_PASSWORD:payflow}
    name: ${DB_NAME:payflow}
  redis:
    enabled: ${PAYFLOW_REDIS_ENABLED:true}
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
  kafka:
    enabled: ${PAYFLOW_KAFKA_ENABLED:true}
    host: ${KAFKA_HOST:kafka}
    port: ${KAFKA_PORT:9092}
  service:
    urls:
      auth-service: ${AUTH_SERVICE_URL:http://auth-service:8081}
      order-service: ${ORDER_SERVICE_URL:http://order-service:8082}
      payment-service: ${PAYMENT_SERVICE_URL:http://payment-service:8083}
      notification-service: ${NOTIFICATION_SERVICE_URL:http://notification-service:8084}
      simulator-service: ${SIMULATOR_SERVICE_URL:http://simulator-service:8086}
      analytics-service: ${ANALYTICS_SERVICE_URL:http://analytics-service:8089}
      audit-service: ${AUDIT_SERVICE_URL:http://audit-service:8090}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized

# Logging Configuration
logging:
  level:
    root: INFO
    dev.payment: DEBUG
    org.springframework.web: INFO

# Resilience4j Default Configuration
resilience4j:
  retry:
    instances:
      default:
        max-attempts: 3
        wait-duration: 500ms
  circuitbreaker:
    instances:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      default:
        timeout-duration: 10s
        cancel-running-future: true