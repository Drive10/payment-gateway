name: payflow

services:
  # Full stack in Docker - all services run in containers
  # Run with: docker compose -f docker-compose.full.yml up -d

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass payflow
    ports:
      - "6379:6379"
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "payflow", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: payflow
      POSTGRES_DB: payflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./src/api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      PAYFLOW_REDIS_HOST: redis
      PAYFLOW_REDIS_PORT: "6379"
      APPLICATION_JWT_SECRET: payflow-dev-jwt-secret-key-256bits-minimum-for-security
      APPLICATION_JWT_EXPIRATION: "86400000"
    networks:
      - payflow-network
    depends_on:
      redis:
        condition: service_healthy

  auth-service:
    build:
      context: ./src/auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payflow
      SPRING_DATASOURCE_USERNAME: payflow
      SPRING_DATASOURCE_PASSWORD: payflow
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: payflow
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      PAYFLOW_DATABASE_ENABLED: "true"
      PAYFLOW_DATABASE_NAME: payflow_auth
      PAYFLOW_REDIS_ENABLED: "true"
      APPLICATION_JWT_SECRET: payflow-dev-jwt-secret-key-256bits-minimum-for-security
      APPLICATION_JWT_EXPIRATION: "86400000"
      APPLICATION_JWT_REFRESH_EXPIRATION: "604800000"
    networks:
      - payflow-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  order-service:
    build:
      context: ./src/order-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payflow
      SPRING_DATASOURCE_USERNAME: payflow
      SPRING_DATASOURCE_PASSWORD: payflow
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYFLOW_DATABASE_ENABLED: "true"
      PAYFLOW_DATABASE_NAME: payflow_order
      PAYFLOW_KAFKA_ENABLED: "true"
      PAYMENT_SERVICE_URL: http://payment-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
      APPLICATION_SECURITY_JWT_SECRET_KEY: payflow-dev-jwt-secret-key-256bits-minimum-for-security
    networks:
      - payflow-network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  payment-service:
    build:
      context: ./src/payment-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payflow
      SPRING_DATASOURCE_USERNAME: payflow
      SPRING_DATASOURCE_PASSWORD: payflow
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: payflow
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYFLOW_DATABASE_ENABLED: "true"
      PAYFLOW_DATABASE_NAME: payflow_payment
      PAYFLOW_REDIS_ENABLED: "true"
      PAYFLOW_KAFKA_ENABLED: "true"
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
      AUTH_SERVICE_URL: http://auth-service:8081
      APPLICATION_GATEWAY_TRUST_ENABLED: "true"
      APPLICATION_GATEWAY_TRUST_INTERNAL_SECRET: dev-gateway-secret
      APPLICATION_INTERNAL_AUTH_SIGNING_SECRET: dev-internal-secret
      APPLICATION_SECURITY_JWT_SECRET_KEY: payflow-dev-jwt-secret-key-256bits-minimum-for-security
    networks:
      - payflow-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: ./src/notification-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payflow
      SPRING_DATASOURCE_USERNAME: payflow
      SPRING_DATASOURCE_PASSWORD: payflow
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: payflow
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYFLOW_DATABASE_ENABLED: "true"
      PAYFLOW_DATABASE_NAME: payflow_notification
      PAYFLOW_REDIS_ENABLED: "true"
      PAYMENT_SERVICE_URL: http://payment-service:8083
    networks:
      - payflow-network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  simulator-service:
    build:
      context: ./src/simulator-service
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - payflow-network
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local

networks:
  payflow-network:
    driver: bridge