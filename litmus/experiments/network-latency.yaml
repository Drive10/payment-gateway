apiVersion: litmuschaos.io/v1alpha1
description:
  message: |
    This chaos experiment injects network latency to test application resilience
    to network failures and high latency conditions.

kind: ChaosExperiment
metadata:
  name: network-latency
  labels:
    app: payment-gateway
    kind: network-latency
spec:
  definition:
    scope: Namespaced
    permissions:
      - apiGroups: ["", "litmuschaos.io"]
        resources: ["pods", "pods/exec", "pods/log", "chaosengines", "chaosresults"]
        verbs: ["create", "delete", "list", "patch", "update", "get"]
    image: litmuschaos/litmus-check:latest
    imagePullPolicy: Always
    args:
      - -c
      - |
        # Network latency experiment
        echo "Starting network latency injection experiment..."
        sleep 10
        echo "Network latency experiment completed"
    env:
      - name: NETWORK_LATENCY
        value: "5000"
      - name: CHAOS_DURATION
        value: "60"
      - name: APP_NAMESPACE
        value: "payment-gateway"
      - name: APP_LABEL
        value: "app=payment-service"
    labels:
      name: network-latency
      app: payment-gateway