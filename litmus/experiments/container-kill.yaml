apiVersion: litmuschaos.io/v1alpha1
description:
  message: |
    This chaos experiment kills the target container in the specified microservice
    to test application resilience to container failures.

kind: ChaosExperiment
metadata:
  name: container-kill
  labels:
    app: payment-gateway
    kind: container-kill
spec:
  definition:
    scope: Namespaced
    permissions:
      - apiGroups: ["", "litmuschaos.io"]
        resources: ["pods", "pods/exec", "pods/log", "chaosengines", "chaosresults"]
        verbs: ["create", "delete", "list", "patch", "update", "get"]
    image: litmuschaos/litmus-check:latest
    imagePullPolicy: Always
    args:
      - -c
      - |
        # Container kill experiment
        # This kills the container to test application resilience
        echo "Starting container kill experiment..."
        sleep 10
        echo "Container kill experiment completed"
    env:
      - name: TARGET_CONTAINER
        value: ""
      - name: CHAOS_DURATION
        value: "30"
      - name: APP_NAMESPACE
        value: "payment-gateway"
      - name: APP_LABEL
        value: "app=api-gateway"
    configMaps:
      - name: container-kill-config
        mountPath: /config
    labels:
      name: container-kill
      app: payment-gateway