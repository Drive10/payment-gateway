request:
  method: POST
  url: /api/v1/auth/login
  headers:
    Content-Type: application/json
  body:
    email: "user@example.com"
    password: "password123"

response:
  status: 200
  headers:
    Content-Type: application/json
  body:
    success: true
    data:
      token: "^[A-Za-z0-9-_]+\\.[A-Za-z0-9-_]+\\.[A-Za-z0-9-_]+$"
      expiresIn: 86400000