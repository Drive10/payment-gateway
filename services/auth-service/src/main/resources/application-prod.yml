spring:
  config:
    import: vault://secret/auth-service

vault:
  enabled: true
  token: ${VAULT_TOKEN:}

datasource:
  password: ${DB_PASSWORD:${vault:db-password:}}

jwt:
  secret: ${JWT_SECRET:${vault:jwt-secret:}}

logging:
  level:
    root: INFO
    dev.payment: INFO
    org.springframework.security: INFO
