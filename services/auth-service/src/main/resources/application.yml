server:
  port: ${SERVER_PORT:8081}
  tomcat:
    max-threads: 150
    accept-count: 100

spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:docker}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:authdb}
    username: ${DB_USERNAME:auth}
    password: ${DB_PASSWORD:devpassword}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 25000
      pool-name: AuthHikariPool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: false

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=600s

vault:
  uri: ${VAULT_ADDR:http://vault:8200}
  token: ${VAULT_TOKEN:}
  enabled: ${VAULT_ENABLED:false}
  ssl:
    enabled: true
  kv:
    enabled: true

jwt:
  secret: ${JWT_SECRET:ILV+eJo6/m2NsKPaBfWGLzr/ew+YZ4ez+MXiYQQg+jbAIqA12PvCnnFolnMcSfkWJ7YgGNM21AHG4HpEHQ1qSg==}
  expiration: 86400000
  refresh-expiration: 604800000

resilience4j:
  ratelimiter:
    instances:
      login:
        limit-for-period: 5
        limit-refresh-period: 60s
        timeout-duration: 10s
        register-health-indicator: true
        event-consumer-buffer-size: 100
      register:
        limit-for-period: 3
        limit-refresh-period: 300s
        timeout-duration: 30s
        register-health-indicator: true
      refresh:
        limit-for-period: 10
        limit-refresh-period: 60s
        timeout-duration: 5s
        register-health-indicator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    dev.payment: INFO
    org.springframework.security: INFO
    org.springframework.vault: DEBUG
