server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/payflow
    username: payflow
    password: payflow
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 25000
      pool-name: AuthHikariPool
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        time_zone: UTC
  flyway:
    enabled: false
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=600s

application:
  jwt:
    secret: YEh9YrZWacfeeM0F3PjuvPxvVuuB6ZCn2p7bsjcdBHY
    expiration: 86400000
    refresh-expiration: 604800000

resilience4j:
  ratelimiter:
    instances:
      login:
        limit-for-period: 100
        limit-refresh-period: 60s
        timeout-duration: 10s
      register:
        limit-for-period: 100
        limit-refresh-period: 60s
        timeout-duration: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.payment: DEBUG