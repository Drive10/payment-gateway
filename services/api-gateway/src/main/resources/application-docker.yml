spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:devpassword}
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - RewritePath=/api/v1/auth/(?<segment>.*), /auth/${segment}
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://order-service:8082}
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=2
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://payment-service:8083}
          predicates:
            - Path=/api/v1/payments/**,/api/v1/admin/**
          filters:
            - StripPrefix=2
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://notification-service:8084}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=2
        - id: simulator-service
          uri: ${SIMULATOR_SERVICE_URL:http://simulator-service:8086}
          predicates:
            - Path=/api/v1/simulator/**
          filters:
            - StripPrefix=2
        - id: analytics-service
          uri: ${ANALYTICS_SERVICE_URL:http://analytics-service:8089}
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - StripPrefix=2
        - id: audit-service
          uri: ${AUDIT_SERVICE_URL:http://audit-service:8090}
          predicates:
            - Path=/api/v1/audit/**
          filters:
            - StripPrefix=2

application:
  gateway:
    internal-secret: ${GATEWAY_INTERNAL_SECRET:internal-gateway-secret}
