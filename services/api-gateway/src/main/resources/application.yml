server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: redis
      port: 6379

  cloud:
    gateway:
      default-filters:
        - PreserveHostHeader

      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/api/v1/orders/**

        - id: payment-service
          uri: http://payment-service:8083
          predicates:
            - Path=/api/v1/payments/**,/api/v1/admin/**

        - id: webhook-service
          uri: http://webhook-service:8085
          predicates:
            - Path=/api/v1/webhooks/**

        - id: swagger-docs
          uri: http://payment-service:8083
          predicates:
            - Path=/swagger-ui.html,/swagger-ui/**,/v3/api-docs/**

        - id: internal-auth
          uri: http://auth-service:8081
          predicates:
            - Path=/platform/auth/**
          filters:
            - RewritePath=/platform/auth/(?<segment>.*), /internal/platform/${segment}

        - id: internal-order
          uri: http://order-service:8082
          predicates:
            - Path=/platform/order/**
          filters:
            - RewritePath=/platform/order/(?<segment>.*), /internal/platform/${segment}

        - id: internal-notification
          uri: http://notification-service:8084
          predicates:
            - Path=/platform/notification/**
          filters:
            - RewritePath=/platform/notification/(?<segment>.*), /internal/platform/${segment}

        - id: internal-webhook
          uri: http://webhook-service:8085
          predicates:
            - Path=/platform/webhook/**
          filters:
            - RewritePath=/platform/webhook/(?<segment>.*), /internal/platform/${segment}

        - id: internal-simulator
          uri: http://simulator-service:8086
          predicates:
            - Path=/platform/simulator/**
          filters:
            - RewritePath=/platform/simulator/(?<segment>.*), /internal/platform/${segment}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO

application:
  gateway:
    internal-secret: ${GATEWAY_INTERNAL_SECRET:dev-gateway-internal-secret}

  services:
    auth: http://auth-service:8081
    order: http://order-service:8082
    payment: http://payment-service:8083
    notification: http://notification-service:8084
    webhook: http://webhook-service:8085
    simulator: http://simulator-service:8086

security:
  jwt:
    secret-key: ${JWT_SECRET_B64:q8V3YkT9Z3xkY2FhZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXo=}