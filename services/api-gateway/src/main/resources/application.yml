server:
  port: 8080
  tomcat:
    max-threads: 200
    accept-count: 100

spring:
  application:
    name: api-gateway

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
          max-wait: 1000ms

  cloud:
    gateway:
      httpclient:
        connect-timeout: 2000
        response-timeout: 5s
      default-filters:
        - PreserveHostHeader
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/api/v1/orders/**

        - id: payment-service
          uri: http://payment-service:8083
          predicates:
            - Path=/api/v1/payments/**,/api/v1/admin/**

        - id: webhook-service
          uri: http://webhook-service:8085
          predicates:
            - Path=/api/v1/webhooks/**

        - id: merchant-service
          uri: http://merchant-service:8090
          predicates:
            - Path=/api/v1/merchants/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200

        - id: dispute-service
          uri: http://dispute-service:8091
          predicates:
            - Path=/api/v1/disputes/**

        - id: swagger-ui
          uri: http://payment-service:8083
          predicates:
            - Path=/swagger-ui/**,/swagger-ui.html
          filters:
            - StripPrefix=0

        - id: openapi-docs
          uri: http://payment-service:8083
          predicates:
            - Path=/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: internal-auth
          uri: http://auth-service:8081
          predicates:
            - Path=/platform/auth/**
          filters:
            - RewritePath=/platform/auth/(?<segment>.*), /internal/platform/${segment}

        - id: internal-order
          uri: http://order-service:8082
          predicates:
            - Path=/platform/order/**
          filters:
            - RewritePath=/platform/order/(?<segment>.*), /internal/platform/${segment}

        - id: internal-notification
          uri: http://notification-service:8084
          predicates:
            - Path=/platform/notification/**
          filters:
            - RewritePath=/platform/notification/(?<segment>.*), /internal/platform/${segment}

        - id: internal-webhook
          uri: http://webhook-service:8085
          predicates:
            - Path=/platform/webhook/**
          filters:
            - RewritePath=/platform/webhook/(?<segment>.*), /internal/platform/${segment}

        - id: internal-simulator
          uri: http://simulator-service:8086
          predicates:
            - Path=/platform/simulator/**
          filters:
            - RewritePath=/platform/simulator/(?<segment>.*), /internal/platform/${segment}

        - id: internal-merchant
          uri: http://merchant-service:8090
          predicates:
            - Path=/platform/merchant/**
          filters:
            - RewritePath=/platform/merchant/(?<segment>.*), /internal/platform/${segment}

        - id: internal-dispute
          uri: http://dispute-service:8091
          predicates:
            - Path=/platform/dispute/**
          filters:
            - RewritePath=/platform/dispute/(?<segment>.*), /internal/platform/${segment}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

logging:
  level:
    root: INFO

application:
  gateway:
    internal-secret: ${GATEWAY_INTERNAL_SECRET:dev-gateway-internal-secret}

  services:
    auth: http://auth-service:8081
    order: http://order-service:8082
    payment: http://payment-service:8083
    notification: http://notification-service:8084
    webhook: http://webhook-service:8085
    simulator: http://simulator-service:8086
    merchant: http://merchant-service:8090
    dispute: http://dispute-service:8091

security:
  jwt:
    secret-key: ${JWT_SECRET_B64:q8V3YkT9Z3xkY2FhZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXo=}