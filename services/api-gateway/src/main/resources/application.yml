server:
  port: ${PORT:8080}

spring:
  application:
    name: ${APP_NAME:api-gateway}
  profiles:
    default: local
  cloud:
    gateway:
      default-filters:
        - PreserveHostHeader
      routes:
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/payments,/api/payments/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

---
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    gateway:
      routes:
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://payment-service:8080}
          predicates:
            - Path=/api/payments,/api/payments/**
          filters:
            - StripPrefix=1
