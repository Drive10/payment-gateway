server:
  port: ${SERVER_PORT:8080}
  tomcat:
    max-threads: 200
    accept-count: 100

spring:
  application:
    name: api-gateway

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_dev_pass}
      timeout: 2000ms
      ssl:
        enabled: false
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
          max-wait: 1000ms

  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "http://localhost:3002"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      default-filters:
        - PreserveHostHeader
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requested-tokens: 1

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/payments/**,/api/v1/admin/**
          filters:
            - StripPrefix=2
            - AddRequestHeader=X-Gateway-Token,${vault:gateway-internal-secret}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=2

        - id: analytics-service
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - StripPrefix=2

        - id: simulator-service
          uri: ${SIMULATOR_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/simulator/**
          filters:
            - StripPrefix=2

        - id: internal-auth
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/platform/auth/**
          filters:
            - RewritePath=/platform/auth/(?<segment>.*), /internal/platform/${segment}

        - id: internal-order
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/platform/order/**
          filters:
            - RewritePath=/platform/order/(?<segment>.*), /internal/platform/${segment}

        - id: internal-payment
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/platform/payment/**
          filters:
            - RewritePath=/platform/payment/(?<segment>.*), /internal/platform/${segment}

        - id: internal-notification
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/platform/notification/**
          filters:
            - RewritePath=/platform/notification/(?<segment>.*), /internal/platform/${segment}

        - id: internal-analytics
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/platform/analytics/**
          filters:
            - RewritePath=/platform/analytics/(?<segment>.*), /internal/platform/${segment}

        - id: internal-simulator
          uri: ${SIMULATOR_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/platform/simulator/**
          filters:
            - RewritePath=/platform/simulator/(?<segment>.*), /internal/platform/${segment}

vault:
  uri: ${VAULT_ADDR:http://vault:8200}
  token: ${VAULT_TOKEN:dev-root-token}
  enabled: ${VAULT_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: false
  api-docs:
    path: /v3/api-docs
    enabled: false

logging:
  level:
    root: INFO

application:
  gateway:
    internal-secret: ${vault:gateway-internal-secret}

  services:
    auth: ${AUTH_SERVICE_URL:http://localhost:8081}
    order: ${ORDER_SERVICE_URL:http://localhost:8082}
    payment: ${PAYMENT_SERVICE_URL:http://localhost:8083}
    notification: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
    analytics: ${ANALYTICS_SERVICE_URL:http://localhost:8085}
    simulator: ${SIMULATOR_SERVICE_URL:http://localhost:8086}

security:
  jwt:
    secret-key: ${vault:jwt-secret}
