server:
  port: ${SERVER_PORT:8080}
  tomcat:
    max-threads: 200
    accept-count: 100

spring:
  application:
    name: api-gateway
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:devpassword}
  cloud:
    consul:
      host: ${CONSUL_HOST:consul}
      port: ${CONSUL_PORT:8500}
      discovery:
        enabled: ${CONSUL_ENABLED:false}
        register: true
        prefer-ip-address: true
        instance-id: ${spring.application.name}:${server.port}
        health-check-path: /actuator/health
        health-check-interval: 10s
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requested-tokens: 1

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**,/api/v1/admin/**
          filters:
            - StripPrefix=2
            - AddRequestHeader=X-Gateway-Token,${GATEWAY_INTERNAL_SECRET:}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=2

        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - StripPrefix=2

        - id: simulator-service
          uri: lb://simulator-service
          predicates:
            - Path=/api/v1/simulator/**
          filters:
            - StripPrefix=2

        - id: internal-auth
          uri: lb://auth-service
          predicates:
            - Path=/platform/auth/**
          filters:
            - RewritePath=/platform/auth/(?<segment>.*), /internal/platform/${segment}

        - id: internal-order
          uri: lb://order-service
          predicates:
            - Path=/platform/order/**
          filters:
            - RewritePath=/platform/order/(?<segment>.*), /internal/platform/${segment}

        - id: internal-payment
          uri: lb://payment-service
          predicates:
            - Path=/platform/payment/**
          filters:
            - RewritePath=/platform/payment/(?<segment>.*), /internal/platform/${segment}

        - id: internal-notification
          uri: lb://notification-service
          predicates:
            - Path=/platform/notification/**
          filters:
            - RewritePath=/platform/notification/(?<segment>.*), /internal/platform/${segment}

        - id: internal-analytics
          uri: lb://analytics-service
          predicates:
            - Path=/platform/analytics/**
          filters:
            - RewritePath=/platform/analytics/(?<segment>.*), /internal/platform/${segment}

        - id: internal-simulator
          uri: lb://simulator-service
          predicates:
            - Path=/platform/simulator/**
          filters:
            - RewritePath=/platform/simulator/(?<segment>.*), /internal/platform/${segment}

application:
  services:
    auth: lb://auth-service
    order: lb://order-service
    payment: lb://payment-service
    notification: lb://notification-service
    analytics: lb://analytics-service
    simulator: lb://simulator-service

security:
  jwt:
    secret-key: ${JWT_SECRET:}