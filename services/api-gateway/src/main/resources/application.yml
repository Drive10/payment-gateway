server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  profiles:
    default: dev
  cloud:
    gateway:
      default-filters:
        - PreserveHostHeader
      routes:
        - id: payment-service
          uri: ${gateway.payment-service-url}
          predicates:
            - Path=/api/v1/**,/swagger-ui.html,/swagger-ui/**,/v3/api-docs/**
          filters:
            - name: Retry
              args:
                retries: 2
                methods: GET,POST
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE
        - id: auth-service
          uri: ${gateway.auth-service-url}
          predicates:
            - Path=/platform/auth/**
          filters:
            - RewritePath=/platform/auth/(?<segment>.*), /internal/platform/${segment}
        - id: ledger-service
          uri: ${gateway.ledger-service-url}
          predicates:
            - Path=/platform/ledger/**
          filters:
            - RewritePath=/platform/ledger/(?<segment>.*), /internal/platform/${segment}
        - id: notification-service
          uri: ${gateway.notification-service-url}
          predicates:
            - Path=/platform/notification/**
          filters:
            - RewritePath=/platform/notification/(?<segment>.*), /internal/platform/${segment}
        - id: risk-service
          uri: ${gateway.risk-service-url}
          predicates:
            - Path=/platform/risk/**
          filters:
            - RewritePath=/platform/risk/(?<segment>.*), /internal/platform/${segment}
        - id: settlement-service
          uri: ${gateway.settlement-service-url}
          predicates:
            - Path=/platform/settlement/**
          filters:
            - RewritePath=/platform/settlement/(?<segment>.*), /internal/platform/${segment}
        - id: simulator-service
          uri: ${gateway.simulator-service-url}
          predicates:
            - Path=/platform/simulator/**
          filters:
            - RewritePath=/platform/simulator/(?<segment>.*), /internal/platform/${segment}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level service=${spring.application.name} trace=%X{traceId:-na} span=%X{spanId:-na} correlation=%X{correlationId:-na} logger=%logger{36} msg=\"%msg\"%n"
