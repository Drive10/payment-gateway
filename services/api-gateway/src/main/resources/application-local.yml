server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    compatibility-verifier:
      enabled: false
  autoconfigure:
    exclude: 
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  data:
    redis:
      host: localhost
      port: 6379
      password: devpassword

spring.cloud.gateway:
  discovery:
    locator:
      enabled: false
  routes:
    - id: auth-service
      uri: http://localhost:8081
      predicates:
        - Path=/api/v1/auth/**
      filters:
        - StripPrefix=2

    - id: order-service
      uri: http://localhost:8082
      predicates:
        - Path=/api/v1/orders/**
      filters:
        - StripPrefix=2

    - id: payment-service
      uri: http://localhost:8083
      predicates:
        - Path=/api/v1/payments/**,/api/v1/admin/**
      filters:
        - StripPrefix=2
        - AddRequestHeader=X-Gateway-Token,${GATEWAY_INTERNAL_SECRET:internal-gateway-secret}

    - id: notification-service
      uri: http://localhost:8084
      predicates:
        - Path=/api/v1/notifications/**
      filters:
        - StripPrefix=2

    - id: analytics-service
      uri: http://localhost:8089
      predicates:
        - Path=/api/v1/analytics/**
      filters:
        - StripPrefix=2

    - id: simulator-service
      uri: http://localhost:8086
      predicates:
        - Path=/api/v1/simulator/**
      filters:
        - StripPrefix=2

    - id: audit-service
      uri: http://localhost:8090
      predicates:
        - Path=/api/v1/audit/**
      filters:
        - StripPrefix=2

application:
  gateway:
    internal-secret: internal-gateway-secret

security:
  jwt:
    secret-key: YEh9YrZWacfeeM0F3PjuvPxvVuuB6ZCn2p7bsjcdBHY
