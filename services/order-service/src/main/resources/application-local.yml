server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:order_db}
    username: ${DB_USERNAME:payflow}
    password: ${DB_PASSWORD:payflow}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

application:
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8083}
  notification-service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}

logging:
  level:
    root: INFO
    dev.payment: DEBUG
