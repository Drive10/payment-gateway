server:
  port: 8082
  shutdown: graceful

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${ORDER_DB:orderdb}
    username: ${ORDER_DB_USER:order}
    password: ${ORDER_DB_PASSWORD:orderpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 10
    consumer:
      group-id: order-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

application:
  order-service:
    url: ${ORDER_SERVICE_URL:http://localhost:8082}

  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://payment-service:8084}

  kafka:
    topic:
      order-events: order.events
      order-events-dlt: order.events.dlt

logging:
  level:
    root: INFO
