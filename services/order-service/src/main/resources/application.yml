server:
  port: 8082
  shutdown: graceful
  tomcat:
    max-threads: 150
    accept-count: 100

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${ORDER_DB:orderdb}
    username: ${ORDER_DB_USER:order}
    password: ${ORDER_DB_PASSWORD:orderpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 25000
      pool-name: OrderHikariPool

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 10
      properties:
        buffer.memory: 33554432
        batch.size: 16384
        linger.ms: 1
    consumer:
      group-id: order-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      max-poll-records: 500

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

application:
  order-service:
    url: ${ORDER_SERVICE_URL:http://localhost:8082}

  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://payment-service:8084}

  kafka:
    topic:
      order-events: order.events
      order-events-dlt: order.events.dlt

logging:
  level:
    root: INFO
