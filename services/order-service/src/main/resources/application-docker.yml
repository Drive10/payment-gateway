server:
  port: ${SERVER_PORT:8082}

spring:
  config:
    activate:
      on-profile: docker

application:
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://payment-service:8083}
    connect-timeout-ms: ${APPLICATION_PAYMENT_SERVICE_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${APPLICATION_PAYMENT_SERVICE_READ_TIMEOUT_MS:5000}
    request-timeout-ms: ${APPLICATION_PAYMENT_SERVICE_REQUEST_TIMEOUT_MS:5000}
  notification-service:
    url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8084}

management:
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://zipkin:9411/api/v2/spans}
