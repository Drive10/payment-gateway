server:
  port: ${SERVER_PORT:8091}

spring:
  application:
    name: dispute-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:disputedb}
    username: ${DB_USERNAME:dispute}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_SERVER:http://eureka:8761/eureka}
    fetch-registry: ${EUREKA_ENABLED:false}
    register-with-eureka: ${EUREKA_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO

# Risk tables (merged from risk-service)
risk:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/analyticsdb
    username: ${DB_USERNAME:payment}
    password: ${DB_PASSWORD}

# Settlement tables (merged from settlement-service)
settlement:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/analyticsdb
    username: ${DB_USERNAME:payment}
    password: ${DB_PASSWORD}

# Dispute tables (merged from dispute-service)
dispute:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/analyticsdb
    username: ${DB_USERNAME:payment}
    password: ${DB_PASSWORD}
