spring:
  config:
    import: vault://secret/analytics-service

vault:
  enabled: true
  token: ${VAULT_TOKEN:}

datasource:
  password: ${DB_PASSWORD:${vault:db-password:}}

application:
  analytics:
    batch-size: 500
    window-size: PT15M

logging:
  level:
    root: WARN
    dev.payment: INFO
