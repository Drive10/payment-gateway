server:
  port: ${SERVER_PORT:8082}
spring:
  application:
    name: ledger-service
  datasource:
    url: ${LEDGER_DB_URL:jdbc:postgresql://localhost:5432/paymentdb?currentSchema=ledger_core}
    username: ${DB_USERNAME:payment}
    password: ${DB_PASSWORD:paymentpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    create-schemas: true
    schemas: ledger_core
    default-schema: ledger_core

management:
  endpoints:
    web:
      exposure:
        include: health,info
