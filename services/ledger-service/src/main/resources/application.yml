server:
  port: ${SERVER_PORT:8082}
spring:
  application:
    name: ledger-service
  profiles:
    default: local
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${LEDGER_CONSUMER_GROUP:ledger-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: dev.payment.common.events
        spring.json.value.default.type: dev.payment.common.events.PaymentEventMessage
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: record

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

application:
  gateway-trust:
    enabled: ${GATEWAY_TRUST_ENABLED:true}
    internal-secret: ${GATEWAY_INTERNAL_SECRET:dev-gateway-internal-secret}
  kafka:
    topic:
      payment-events: ${PAYMENT_EVENTS_TOPIC:payment.events}
      payment-events-dlt: ${PAYMENT_EVENTS_DLT_TOPIC:payment.events.dlt}
    consumer:
      retry-attempts: ${KAFKA_CONSUMER_RETRY_ATTEMPTS:3}
      retry-backoff-ms: ${KAFKA_CONSUMER_RETRY_BACKOFF_MS:1000}
  ledger:
    accounts:
      cash: ${LEDGER_CASH_ACCOUNT_CODE:CASH_ASSET}
      customer-funds: ${LEDGER_CUSTOMER_FUNDS_ACCOUNT_CODE:CUSTOMER_FUNDS_LIABILITY}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level service=${spring.application.name} trace=%X{traceId:-na} span=%X{spanId:-na} correlation=%X{correlationId:-na} logger=%logger{36} msg=\"%msg\"%n"
