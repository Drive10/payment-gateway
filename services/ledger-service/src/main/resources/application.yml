server:
  port: 8082

spring:
  application:
    name: ledger-service

  datasource:
    url: jdbc:postgresql://postgres:5432/ledgerdb
    username: payment
    password: paymentpass
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: ledger-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: dev.payment.common.events
        spring.json.value.default.type: dev.payment.common.events.PaymentEventMessage
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: record

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

application:
  gateway-trust:
    enabled: true
    internal-secret: dev-gateway-internal-secret

  kafka:
    topic:
      payment-events: payment.events
      payment-events-dlt: payment.events.dlt
    consumer:
      retry-attempts: 3
      retry-backoff-ms: 1000

  ledger:
    accounts:
      cash: CASH_ASSET
      customer-funds: CUSTOMER_FUNDS_LIABILITY

logging:
  level:
    root: INFO