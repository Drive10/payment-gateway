request:
  method: POST
  url: /api/v1/merchants
  headers:
    Content-Type: application/json
  body:
    email: "merchant@example.com"
    businessName: "Test Store"
    businessType: "RETAIL"

response:
  status: 201
  headers:
    Content-Type: application/json
  body:
    success: true
    data:
      merchantId: "^[a-f0-9-]{36}$"
      status: "PENDING"