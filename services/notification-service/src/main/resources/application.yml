server:
  port: 8083

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://postgres:5432/notificationdb
    username: payment
    password: paymentpass
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: dev.payment.common.events
        spring.json.value.default.type: dev.payment.common.events.PaymentEventMessage
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: record

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

application:
  kafka:
    topic:
      payment-events: payment.events
      payment-events-dlt: payment.events.dlt
    consumer:
      retry-attempts: 3
      retry-backoff-ms: 1000

logging:
  level:
    root: INFO