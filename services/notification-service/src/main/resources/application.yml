server:
  port: ${SERVER_PORT:8084}
  shutdown: graceful

spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:payment_gateway}
    username: ${DB_USERNAME:payment}
    password: ${DB_PASSWORD:devpassword}
    driver-class-name: org.mariadb.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      spring.json.trusted.packages: "*"
      spring.kafka.listener.simple.auto-startup: true
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  cloud:
    consul:
      host: ${CONSUL_HOST:consul}
      port: ${CONSUL_PORT:8500}
      discovery:
        enabled: ${CONSUL_ENABLED:false}
        register: true
        prefer-ip-address: true
        instance-id: ${spring.application.name}:${server.port}
        health-check-path: /actuator/health
        health-check-interval: 10s

vault:
  uri: ${VAULT_ADDR:http://localhost:8200}
  token: ${VAULT_TOKEN:}
  enabled: ${VAULT_ENABLED:false}
  ssl:
    enabled: false
  kv:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    dev.payment: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

# Application-specific configuration
application:
  payment-service:
    url: lb://payment-service
  kafka:
    topic:
      notification-events: notification.events
      webhook-updates: webhook.updates
  email:
    from-address: noreply@payment-gateway.local
    from-name: Payment Gateway
  sms:
    provider: SIMULATOR
