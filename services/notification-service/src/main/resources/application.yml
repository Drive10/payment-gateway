server:
  port: 8084
  shutdown: graceful

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://postgres:5432/payflow_notification
    username: payflow
    password: payflow
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: redis
      port: 6379
      password: payflow-redis
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: kafka:29092
    properties:
      spring.json.trusted.packages: "*"
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

application:
  payment-service:
    url: http://payment-service:8083
  kafka:
    topic:
      notification-events: notification.events
      webhook-updates: webhook.updates
  email:
    from-address: noreply@payment-gateway.local
    from-name: Payment Gateway
  sms:
    provider: SIMULATOR

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO