server:
  port: ${SERVER_PORT:8092}

spring:
  application:
    name: featureflags-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:featureflagsdb}
    username: ${DB_USERNAME:feature}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO

# Webhook tables (merged from webhook-service)
webhook:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/notificationdb
    username: ${DB_USERNAME:payment}
    password: ${DB_PASSWORD}

# Feature flags (merged from featureflags-service)
featureflags:
  enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/notificationdb
    username: ${DB_USERNAME:payment}
    password: ${DB_PASSWORD}
