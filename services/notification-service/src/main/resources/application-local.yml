server:
  port: ${SERVER_PORT:8085}
  shutdown: graceful

spring:
  application:
    name: notification-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:postgresql://localhost:5432/payflow
    username: payflow
    password: payflow

  data:
    redis:
      host: localhost
      port: 6379
      password: devpassword

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    root: INFO
    dev.payment: DEBUG