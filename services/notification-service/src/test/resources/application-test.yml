spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/notificationdb
    username: notification
    password: notificationpass
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest

server:
  port: 0
