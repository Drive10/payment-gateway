spring:
  config:
    activate:
      on-profile: hybrid
  datasource:
    url: jdbc:postgresql://${DB_HOST:host.docker.internal}:${DB_PORT:5432}/${DB_NAME:payment_db}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:host.docker.internal:9092}
  data:
    redis:
      host: ${REDIS_HOST:host.docker.internal}
      port: ${REDIS_PORT:6379}

application:
  simulator:
    base-url: ${SIMULATOR_SERVICE_URL:http://simulator-service:8086}
  webhook:
    service-url: ${NOTIFICATION_SERVICE_URL:http://host.docker.internal:8084}
  order:
    service-url: ${ORDER_SERVICE_URL:http://host.docker.internal:8082}
  auth:
    service-url: ${AUTH_SERVICE_URL:http://host.docker.internal:8081}
  gateway-trust:
    enabled: false
