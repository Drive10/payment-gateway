spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mariadb://localhost:3306/payment_gateway
    username: payment
    password: ${DB_PASSWORD:devpassword}
    driver-class-name: org.mariadb.jdbc.Driver

  kafka:
    bootstrap-servers: localhost:9092

  data:
    redis:
      host: localhost
      port: 6379
