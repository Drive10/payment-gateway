spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payflow_payment
    username: ${DB_USERNAME:payflow}
    password: ${DB_PASSWORD:payflow}
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:payflow-redis}
  kafka:
    bootstrap-servers: localhost:9092

application:
  simulator:
    base-url: http://localhost:8086
  webhook:
    service-url: http://localhost:8084
  order:
    service-url: http://localhost:8082
  auth:
    service-url: http://localhost:8081
  gateway-trust:
    enabled: false
    internal-secret: ${GATEWAY_INTERNAL_SECRET:dev-only-gateway-secret-change-me}

server:
  port: 8083

logging:
  level:
    root: INFO
    dev.payment.paymentservice: DEBUG
