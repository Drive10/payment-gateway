spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/paymentdb
    username: payment
    password: paymentpass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  kafka:
    bootstrap-servers: localhost:9092

application:
  simulator:
    base-url: http://localhost:8084

  gateway-trust:
    enabled: false

logging:
  level:
    root: INFO
    dev.payment: DEBUG
