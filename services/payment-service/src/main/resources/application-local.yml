spring:
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/payment_gateway}
    username: ${DB_USERNAME:payment}
    password: ${DB_PASSWORD:devpassword}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

application:
  simulator:
    base-url: ${SIMULATOR_BASE_URL:http://localhost:8086}
  webhook:
    service-url: ${WEBHOOK_SERVICE_URL:http://localhost:8085}
  order:
    service-url: ${ORDER_SERVICE_URL:http://localhost:8082}
  auth:
    service-url: ${AUTH_SERVICE_URL:http://localhost:8081}

  gateway-trust:
    enabled: false

logging:
  level:
    root: INFO
    dev.payment: DEBUG
