spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:payment_db}
    username: ${DB_USERNAME:payflow}
    password: ${DB_PASSWORD:payflow}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:devpassword}

application:
  simulator:
    base-url: ${SIMULATOR_SERVICE_URL:http://simulator-service:8086}
  webhook:
    service-url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8084}
  order:
    service-url: ${ORDER_SERVICE_URL:http://order-service:8082}
  auth:
    service-url: ${AUTH_SERVICE_URL:http://auth-service:8081}
  gateway-trust:
    enabled: false
