spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:mariadb}:${DB_PORT:3306}/${DB_NAME:payment_gateway}
    username: root
    password: ${DB_PASSWORD:-rootpassword}
    driver-class-name: org.mariadb.jdbc.Driver

  kafka:
    bootstrap-servers: kafka:29092

application:
  simulator:
    base-url: ${SIMULATOR_SERVICE_URL:http://simulator-service:8086}
  webhook:
    service-url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8085}
  order:
    service-url: ${ORDER_SERVICE_URL:http://order-service:8084}
  auth:
    service-url: ${AUTH_SERVICE_URL:http://auth-service:8081}

  gateway-trust:
    enabled: false

logging:
  level:
    root: INFO
