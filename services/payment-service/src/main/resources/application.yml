server:
  port: 8083
  shutdown: graceful
  tomcat:
    max-threads: 200
    accept-count: 100
    connection-timeout: 20000

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://postgres:5432/payflow_payment
    username: payflow
    password: payflow
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      pool-name: PaymentHikariPool
      register-mbeans: true
  data:
    redis:
      host: redis
      port: 6379
      password: payflow-redis
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
          max-wait: 1000ms
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: false
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: kafka:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: 1
      retries: 3
      batch-size: 32768
      buffer-memory: 67108864
      linger-ms: 5
      max-in-flight-requests-per-connection: 5
      compression-type: lz4
    consumer:
      group-id: payment-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      max-poll-records: 500
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

application:
  gateway-trust:
    enabled: false
  security:
    jwt:
      secret-key: dGhpcy1pcy1hLXZlcnktc2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1maW50ZWNoLXBheW1lbnQta2V5LWJhc2U2NC1lbmNvZGVk
      expiration-seconds: 3600
      refresh-expiration-seconds: 2592000
  payment:
    default-provider: RAZORPAY_SIMULATOR
    checkout-base-url: http://frontend:5173
  simulator:
    base-url: http://simulator-service:8086
  webhook:
    service-url: http://notification-service:8084
    max-retries: 3
    timeout-ms: 5000
  order:
    service-url: http://order-service:8082
  auth:
    service-url: http://auth-service:8081
  kafka:
    topic:
      payment-events: payment.events
      payment-events-dlt: payment.events.dlt
      payment-status-updated: payment.status.updated
      webhook-updates: webhook.updates
    consumer:
      retry-attempts: 3
      retry-backoff-ms: 1000
  outbox:
    relay-delay-ms: 2000
  reconciliation:
    enabled: true
    batch-size: 50
    lookback: PT6H

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    dev.payment: DEBUG

resilience4j:
  retry:
    instances:
      simulator:
        max-attempts: 3
        wait-duration: 300ms
      orderService:
        max-attempts: 3
        wait-duration: 300ms
  circuitbreaker:
    instances:
      simulator:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      orderService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s