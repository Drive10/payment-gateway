server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful
  tomcat:
    max-threads: 200
    accept-count: 100
    connection-timeout: 20000

spring:
  application:
    name: payment-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:payment_gateway}
    username: ${DB_USERNAME:payment}
    password: ${DB_PASSWORD:devpassword}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      pool-name: PaymentHikariPool
      register-mbeans: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
          max-wait: 1000ms

  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: false
    hibernate:
      ddl-auto: validate

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: 1
      retries: 3
      batch-size: 32768
      buffer-memory: 67108864
      linger-ms: 5
      max-in-flight-requests-per-connection: 5
      compression-type: lz4
      properties:
        buffer.memory: 67108864
        batch.size: 32768
        linger.ms: 5
    consumer:
      group-id: payment-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      max-poll-records: 500
      properties:
        fetch.min.bytes: 1
        fetch.max.wait.ms: 500

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

  flyway:
    enabled: false

  cloud:
    consul:
      host: ${CONSUL_HOST:consul}
      port: ${CONSUL_PORT:8500}
      discovery:
        enabled: ${CONSUL_ENABLED:-true}
        register: true
        prefer-ip-address: true
        instance-id: ${spring.application.name}:${server.port}
        health-check-path: /actuator/health
        health-check-interval: 10s

vault:
  uri: ${VAULT_ADDR:http://localhost:8200}
  token: ${VAULT_TOKEN:}
  enabled: ${VAULT_ENABLED:false}
  ssl:
    enabled: true
  kv:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

application:
  gateway-trust:
    enabled: true
    internal-secret: ${INTERNAL_SECRET:}

  security:
    jwt:
      secret-key: ${JWT_SECRET:}
      expiration-seconds: 3600
      refresh-expiration-seconds: 2592000

  payment:
    default-provider: RAZORPAY_SIMULATOR
    checkout-base-url: ${CHECKOUT_BASE_URL:http://localhost:3000}

  simulator:
    base-url: ${SIMULATOR_SERVICE_URL:http://localhost:8086}

  webhook:
    service-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}

  order:
    service-url: lb://order-service

  auth:
    service-url: lb://auth-service

  kafka:
    topic:
      payment-events: payment.events
      payment-events-dlt: payment.events.dlt
      payment-status-updated: payment.status.updated
      webhook-updates: webhook.updates
    consumer:
      retry-attempts: 3
      retry-backoff-ms: 1000

  outbox:
    relay-delay-ms: 2000

  reconciliation:
    enabled: true
    batch-size: 50
    lookback: PT6H

  bootstrap:
    admin-email: ""
    admin-password: ""

logging:
  level:
    root: INFO
    dev.payment: DEBUG

resilience4j:
  retry:
    instances:
      simulator:
        max-attempts: 3
        wait-duration: 300ms
      orderService:
        max-attempts: 3
        wait-duration: 300ms
  circuitbreaker:
    instances:
      simulator:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      orderService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
