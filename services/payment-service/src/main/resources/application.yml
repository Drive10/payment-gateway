server:
  port: ${SERVER_PORT:8084}
  shutdown: graceful

spring:
  application:
    name: payment-service
  profiles:
    default: dev
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  jackson:
    default-property-inclusion: non_null
  threads:
    virtual:
      enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 10
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 120000
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: dev.payment.common.events
        spring.json.value.default.type: dev.payment.common.events.PaymentEventMessage

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  payment:
    default-provider: ${DEFAULT_PROVIDER:RAZORPAY_SIMULATOR}
    checkout-base-url: ${CHECKOUT_BASE_URL:http://localhost:3000}
  simulator:
    base-url: ${SIMULATOR_SERVICE_URL:}
  ledger:
    base-url: ${LEDGER_SERVICE_URL:}
    accounts:
      cash: ${LEDGER_CASH_ACCOUNT_CODE:CASH_ASSET}
      customer-funds: ${LEDGER_CUSTOMER_FUNDS_ACCOUNT_CODE:CUSTOMER_FUNDS_LIABILITY}
  kafka:
    topic:
      payment-events: ${PAYMENT_EVENTS_TOPIC:payment.events}
  webhook:
    razorpay:
      secret: ${RAZORPAY_WEBHOOK_SECRET:}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level service=${spring.application.name} trace=%X{traceId:-na} span=%X{spanId:-na} correlation=%X{correlationId:-na} logger=%logger{36} msg=\"%msg\"%n"

resilience4j:
  retry:
    instances:
      simulator:
        max-attempts: 3
        wait-duration: 300ms
      ledger:
        max-attempts: 3
        wait-duration: 300ms
  circuitbreaker:
    instances:
      simulator:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      ledger:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

info:
  app:
    name: Fintech Payment Platform
    description: Gateway-ready enterprise payment backend
    version: 1.0.0
