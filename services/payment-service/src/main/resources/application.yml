server:
  port: 8084
  shutdown: graceful

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://postgres:5432/paymentdb
    username: payment
    password: paymentpass
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  kafka:
    bootstrap-servers: kafka:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 10
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

application:
  gateway-trust:
    enabled: true
    internal-secret: ${GATEWAY_INTERNAL_SECRET:dev-gateway-internal-secret}

  security:
    jwt:
      secret-key: ${JWT_SECRET_B64:q8V3YkT9Z3xkY2FhZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXo=}
      expiration-seconds: 3600
      refresh-expiration-seconds: 2592000

  payment:
    default-provider: RAZORPAY_SIMULATOR
    checkout-base-url: http://frontend

  simulator:
    base-url: ${SIMULATOR_BASE_URL:http://payment-service:8084}

  kafka:
    topic:
      payment-events: payment.events

logging:
  level:
    root: INFO

resilience4j:
  retry:
    instances:
      simulator:
        max-attempts: 3
        wait-duration: 300ms