server:
  port: ${SERVER_PORT:8084}
  shutdown: graceful

spring:
  application:
    name: payment-service
  profiles:
    default: local
  datasource:
    username: ${DB_USERNAME:payment}
    password: ${DB_PASSWORD:paymentpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
  jackson:
    default-property-inclusion: non_null
  sql:
    init:
      mode: always
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:VGhpc0lzQVN0cm9uZ0Jhc2U2NEVuY29kZWRKU1dUU2VjcmV0S2V5Rm9yRmluVGVjaEFQSUM=}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  payment:
    default-provider: ${DEFAULT_PROVIDER:RAZORPAY_SIMULATOR}
    checkout-base-url: ${CHECKOUT_BASE_URL:https://checkout.fintech.local}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level service=${spring.application.name} trace=%X{traceId:-na} span=%X{spanId:-na} logger=%logger{36} msg=\"%msg\"%n"

info:
  app:
    name: Fintech Payment Platform
    description: Gateway-ready enterprise payment backend
    version: 1.0.0
