server:
  port: 8083
  shutdown: graceful
  tomcat:
    max-threads: 200
    accept-count: 100
    connection-timeout: 20000

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:paymentdb}
    username: ${DB_USERNAME:payment}
    password: ${DB_PASSWORD:paymentpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      pool-name: PaymentHikariPool

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: false
    hibernate:
      ddl-auto: validate

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 10
      properties:
        buffer.memory: 33554432
        batch.size: 16384
        linger.ms: 1
    consumer:
      group-id: payment-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      max-poll-records: 500
      properties:
        fetch.min.bytes: 1
        fetch.max.wait.ms: 500

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

application:
  gateway-trust:
    enabled: true
    internal-secret: ${GATEWAY_INTERNAL_SECRET:dev-gateway-internal-secret}

  security:
    jwt:
      secret-key: ${JWT_SECRET_B64:q8V3YkT9Z3xkY2FhZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXo=}
      expiration-seconds: 3600
      refresh-expiration-seconds: 2592000

  payment:
    default-provider: RAZORPAY_SIMULATOR
    checkout-base-url: http://frontend

  simulator:
    base-url: ${SIMULATOR_BASE_URL:http://simulator-service:8086}

  webhook:
    service-url: ${WEBHOOK_SERVICE_URL:http://webhook-service:8085}

  order:
    service-url: ${ORDER_SERVICE_URL:http://order-service:8082}

  auth:
    service-url: ${AUTH_SERVICE_URL:http://auth-service:8081}

  kafka:
    topic:
      payment-events: payment.events
      payment-events-dlt: payment.events.dlt
      payment-status-updated: payment.status.updated
      webhook-updates: webhook.updates
    consumer:
      retry-attempts: 3
      retry-backoff-ms: 1000

  outbox:
    relay-delay-ms: 2000

  reconciliation:
    enabled: false
    batch-size: 50
    lookback: PT6H

  bootstrap:
    admin-email: ""
    admin-password: ""

logging:
  level:
    root: INFO

resilience4j:
  retry:
    instances:
      simulator:
        max-attempts: 3
        wait-duration: 300ms
      orderService:
        max-attempts: 3
        wait-duration: 300ms
  circuitbreaker:
    instances:
      simulator:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      orderService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
