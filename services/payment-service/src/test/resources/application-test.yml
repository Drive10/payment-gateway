server:
  port: 8083
  shutdown: graceful

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/testdb
    username: test
    password: test
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092

  cache:
    type: simple

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus