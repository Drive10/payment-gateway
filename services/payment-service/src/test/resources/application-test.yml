spring:
  datasource:
    url: jdbc:h2:mem:paymentdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

application:
  gateway-trust:
    enabled: false
  security:
    jwt:
      secret-key: VGhpc0lzQVN0cm9uZ0Jhc2U2NEVuY29kZWRKU1dUU2VjcmV0S2V5Rm9yRmluVGVjaEFQSUM=
      expiration-seconds: 3600
  webhook:
    razorpay:
      secret: test_webhook_secret
  ledger:
    accounts:
      cash: CASH
      customer-funds: CUSTOMER_FUNDS
