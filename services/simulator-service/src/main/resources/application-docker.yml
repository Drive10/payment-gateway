spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:payflow}
    username: ${DB_USERNAME:payflow}
    password: ${DB_PASSWORD:devpassword}
    driver-class-name: org.postgresql.Driver
  flyway:
    validate-on-migrate: false

webhook:
  service-url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8084}
