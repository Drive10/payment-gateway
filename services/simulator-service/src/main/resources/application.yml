server:
  port: ${SERVER_PORT:8086}
  shutdown: graceful

spring:
  application:
    name: simulator-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:simulatordb}
    username: ${DB_USERNAME:simulator}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 25000
      pool-name: SimulatorHikariPool

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: false

vault:
  uri: ${VAULT_ADDR:http://localhost:8200}
  token: ${VAULT_TOKEN:}
  enabled: ${VAULT_ENABLED:false}
  ssl:
    enabled: true
  kv:
    enabled: true

webhook:
  service-url: ${WEBHOOK_SERVICE_URL:http://localhost:8085}
  simulator-success-rate: ${SIMULATOR_SUCCESS_RATE:90}
  simulator-mode: ${SIMULATOR_MODE:random}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    dev.payment: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
