server:
  port: 8087

spring:
  application:
    name: simulator-service

  datasource:
    url: jdbc:postgresql://postgres:5432/simulatordb
    username: payment
    password: paymentpass
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO