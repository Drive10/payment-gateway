server:
  port: 8086
  shutdown: graceful

spring:
  application:
    name: simulator-service

simulator:
  enabled: true
  async-webhooks: true
  latency:
    min-ms: 300
    max-ms: 800
  failure-rate: 0.1
  modes:
    success: "4111111111111111"
    declined: "4000000000000002"
    insufficient-funds: "4000000000009995"
    expired: "4000000000000001"
    processing-error: "5000000000000000"
  webhook:
    enabled: true
    retry-attempts: 3
    retry-delay-ms: 1000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    dev.payment.simulatorservice: DEBUG