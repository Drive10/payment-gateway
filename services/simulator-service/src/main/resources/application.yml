server:
  port: ${SERVER_PORT:8086}

spring:
  profiles:
    default: local

  application:
    name: simulator-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:simulatordb}
    username: ${DB_USERNAME:simulator}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    out-of-order: true
    ignore-missing-migrations: true
    ignore-pending-migrations: true

webhook:
  service-url: ${WEBHOOK_SERVICE_URL:http://localhost:8085}
  simulator-success-rate: ${SIMULATOR_SUCCESS_RATE:90}
  simulator-mode: ${SIMULATOR_MODE:random}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
