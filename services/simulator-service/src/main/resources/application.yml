server:
  port: 8086

webhook:
  service-url: ${WEBHOOK_SERVICE_URL:http://webhook-service:8085}
  simulator-success-rate: ${SIMULATOR_SUCCESS_RATE:90}
  simulator-mode: ${SIMULATOR_MODE:random}

spring:
  application:
    name: simulator-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:simulatordb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
