server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: graphql-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    schema:
      locations: classpath:graphql/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    graphql: DEBUG
    org.springframework.graphql: DEBUG

# Service URLs for data fetching
services:
  auth: ${AUTH_SERVICE_URL:http://localhost:8081}
  order: ${ORDER_SERVICE_URL:http://localhost:8082}
  payment: ${PAYMENT_SERVICE_URL:http://localhost:8083}
  notification: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
  analytics: ${ANALYTICS_SERVICE_URL:http://localhost:8085}
