server:
  port: ${SERVER_PORT:8085}
  shutdown: graceful

spring:
  application:
    name: webhook-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:webhookdb}
    username: ${DB_USERNAME:webhook}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

application:
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8083}
  webhook:
    signature:
      secret: ${WEBHOOK_SIGNATURE_SECRET}
      enabled: ${WEBHOOK_SIGNATURE_ENABLED:true}

logging:
  level:
    root: INFO
