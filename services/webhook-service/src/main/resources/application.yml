server:
  port: 8085
  shutdown: graceful

spring:
  application:
    name: webhook-service

  datasource:
    url: jdbc:postgresql://postgres:5432/webhookdb
    username: webhook
    password: webhookpass
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

application:
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://payment-service:8084}
  webhook:
    signature:
      secret: ${WEBHOOK_SIGNATURE_SECRET:dev-webhook-secret}
      enabled: ${WEBHOOK_SIGNATURE_ENABLED:true}

logging:
  level:
    root: INFO
