server:
  port: ${SERVER_PORT:8091}

spring:
  application:
    name: dispute-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:disputedb}
    username: ${DB_USERNAME:dispute}
    password: ${DB_PASSWORD:disputepass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_SERVER:http://eureka:8761/eureka}
    fetch-registry: ${EUREKA_ENABLED:false}
    register-with-eureka: ${EUREKA_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
