name: Release Images

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target deployment environment tag
        required: true
        default: stage
        type: choice
        options:
          - stage
          - prod
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: payment-service
            context: .
            dockerfile: Dockerfile
            build-args: ""
          - image: api-gateway
            context: .
            dockerfile: Dockerfile.build
            build-args: SERVICE_PATH=services/api-gateway
          - image: auth-service
            context: .
            dockerfile: Dockerfile.build
            build-args: SERVICE_PATH=services/auth-service
          - image: ledger-service
            context: .
            dockerfile: Dockerfile.build
            build-args: SERVICE_PATH=services/ledger-service
          - image: notification-service
            context: .
            dockerfile: Dockerfile.build
            build-args: SERVICE_PATH=services/notification-service
          - image: risk-service
            context: .
            dockerfile: Dockerfile.build
            build-args: SERVICE_PATH=services/risk-service
          - image: settlement-service
            context: .
            dockerfile: Dockerfile.build
            build-args: SERVICE_PATH=services/settlement-service
          - image: simulator-service
            context: .
            dockerfile: Dockerfile.build
            build-args: SERVICE_PATH=services/simulator-service
          - image: frontend
            context: services/frontend
            dockerfile: Dockerfile
            build-args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and publish ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build-args }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/payment-gateway-${{ matrix.image }}:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/payment-gateway-${{ matrix.image }}:${{ github.sha }}
