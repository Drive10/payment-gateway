name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure Kubernetes credentials
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Set deployment variables
        id: vars
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "namespace=payflow-$ENV" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Deploy infrastructure
        run: |
          kubectl apply -k k8s/base/
          kubectl apply -k k8s/overlays/${{ steps.vars.outputs.environment }}/

      - name: Wait for rollout
        run: |
          for svc in api-gateway auth-service order-service payment-service notification-service analytics-service simulator-service; do
            echo "Waiting for $svc rollout..."
            kubectl rollout status deployment/$svc -n ${{ steps.vars.outputs.namespace }} --timeout=300s
          done

      - name: Run smoke tests
        run: |
          # Wait for services to be ready
          sleep 30

          # Test health endpoints
          GATEWAY_URL=$(kubectl get svc api-gateway -n ${{ steps.vars.outputs.namespace }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

          for endpoint in health actuator/health; do
            echo "Testing $endpoint..."
            curl -sf http://$GATEWAY_URL/$endpoint || exit 1
          done

          echo "All smoke tests passed!"

      - name: Notify deployment success
        if: success()
        run: |
          echo "Deployment to ${{ steps.vars.outputs.environment }} completed successfully"
          echo "Commit: ${{ github.sha }}"
          echo "Image tag: ${{ steps.vars.outputs.image_tag }}"
