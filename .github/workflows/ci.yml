name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: payment
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: paymentdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U payment"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build all services
        run: mvn -B clean package -DskipTests

      - name: Run unit tests
        run: mvn -B test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/target/surefire-reports/'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: '**/target/*.jar'

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          build-args: SERVICE_PATH=services/api-gateway
          push: true
          tags: ghcr.io/${{ github.repository }}/api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          build-args: SERVICE_PATH=services/auth-service
          push: true
          tags: ghcr.io/${{ github.repository }}/auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Payment Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          build-args: SERVICE_PATH=services/payment-service
          push: true
          tags: ghcr.io/${{ github.repository }}/payment-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Order Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          build-args: SERVICE_PATH=services/order-service
          push: true
          tags: ghcr.io/${{ github.repository }}/order-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          build-args: SERVICE_PATH=services/notification-service
          push: true
          tags: ghcr.io/${{ github.repository }}/notification-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Analytics Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          build-args: SERVICE_PATH=services/analytics-service
          push: true
          tags: ghcr.io/${{ github.repository }}/analytics-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Simulator Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          build-args: SERVICE_PATH=services/simulator-service
          push: true
          tags: ghcr.io/${{ github.repository }}/simulator-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
