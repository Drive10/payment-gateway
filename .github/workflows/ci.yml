name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build
        run: mvn -q verify

      - name: Validate compose configurations
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.yml --profile services config > /dev/null
          docker compose -f docker-compose.yml -f docker-compose.docker.yml --profile services --profile full --profile optional config > /dev/null

      - name: Package application images
        run: |
          docker build -f Dockerfile -t fintech/payment-service:ci .
          docker build -f Dockerfile.build --build-arg SERVICE_PATH=services/api-gateway -t fintech/api-gateway:ci .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint and build
        run: npm run check

      - name: Build frontend image
        run: docker build -t fintech/frontend:ci .
