name: CI/CD Pipeline

on:
  push:
    branches: 
      - main
      - dev/**
    tags:
      - v*
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: payment-gateway

jobs:
  # ============================================================
  # JOB 1: BUILD - Compile code and build Docker images
  # ============================================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build with Maven
        run: mvn clean package -DskipTests
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
      
      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.build
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVICE_PATH=services/api-gateway
            SERVICE_PATH=services/auth-service
            SERVICE_PATH=services/order-service
            SERVICE_PATH=services/payment-service
            SERVICE_PATH=services/notification-service
            SERVICE_PATH=services/simulator-service
            SERVICE_PATH=services/analytics-service
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          DOCKER_BUILDKIT: 1
      
      - name: Build and tag each service
        run: |
          services="api-gateway auth-service order-service payment-service notification-service simulator-service analytics-service graphql-gateway search-service audit-service"
          for service in $services; do
            echo "Building $service..."
            docker build \
              --build-arg SERVICE_PATH=services/$service \
              -t ${{ env.REGISTRY }}/${{ github.repository }}/$service:build-${{ github.sha }} \
              -f Dockerfile.build .
          done

  # ============================================================
  # JOB 2: TEST - Run unit tests
  # ============================================================
  test:
    runs-on: ubuntu-latest
    needs: build
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: payment
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run tests
        run: mvn test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: paymentdb
          DB_USERNAME: payment
          DB_PASSWORD: testpass
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  # ============================================================
  # JOB 3: SECURITY - Run security scans
  # ============================================================
  security-scan:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Scan for hardcoded secrets
        run: |
          if grep -r "password.*=.*['\"][a-zA-Z0-9]" --include="*.java" --include="*.yml" services/ 2>/dev/null | grep -v "application.yml" | grep -v "test" | grep -v "example" | grep -v "template"; then
            echo "WARNING: Possible hardcoded secrets found"
            exit 1
          else
            echo "✓ No hardcoded secrets detected"
          fi

  # ============================================================
  # JOB 4: DEPLOY - Push to registry on main/dev branches
  # ============================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [build, test, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/dev/'))
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract Git info
        run: |
          echo "BRANCH=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "SHA=${{ github.sha }}" >> $GITHUB_ENV
      
      - name: Build and push images
        run: |
          services="api-gateway auth-service order-service payment-service notification-service simulator-service analytics-service graphql-gateway search-service audit-service"
          
          for service in $services; do
            echo "Building and pushing $service..."
            
            # Build
            docker build \
              --build-arg SERVICE_PATH=services/$service \
              -t ${{ env.REGISTRY }}/${{ github.repository }}/$service:latest \
              -t ${{ env.REGISTRY }}/${{ github.repository }}/$service:${{ github.sha }} \
              -f Dockerfile.build .
            
            # Push
            docker push ${{ env.REGISTRY }}/${{ github.repository }}/$service:latest
            docker push ${{ env.REGISTRY }}/${{ github.repository }}/$service:${{ github.sha }}
            
            echo "✓ $service pushed"
          done
      
      - name: Notify deployment system
        run: |
          echo "Images pushed successfully!"
