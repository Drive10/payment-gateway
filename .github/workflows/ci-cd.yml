name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean verify -DskipTests=false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: **/target/surefire-reports/*.xml

      - name: Generate version
        id: version
        run: echo "version=$(date +%Y%m%d)-${{ github.sha }}" >> $GITHUB_OUTPUT

  build-images:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          push: true
          tags: ${{ env.REGISTRY }}/payment-gateway/auth-service:${{ needs.build.outputs.version }}
          build-args: SERVICE_PATH=services/auth-service

      - name: Build and push order-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          push: true
          tags: ${{ env.REGISTRY }}/payment-gateway/order-service:${{ needs.build.outputs.version }}
          build-args: SERVICE_PATH=services/order-service

      - name: Build and push payment-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          push: true
          tags: ${{ env.REGISTRY }}/payment-gateway/payment-service:${{ needs.build.outputs.version }}
          build-args: SERVICE_PATH=services/payment-service

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          push: true
          tags: ${{ env.REGISTRY }}/payment-gateway/api-gateway:${{ needs.build.outputs.version }}
          build-args: SERVICE_PATH=services/api-gateway

      - name: Build and push notification-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          push: true
          tags: ${{ env.REGISTRY }}/payment-gateway/notification-service:${{ needs.build.outputs.version }}
          build-args: SERVICE_PATH=services/notification-service

      - name: Build and push webhook-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          push: true
          tags: ${{ env.REGISTRY }}/payment-gateway/webhook-service:${{ needs.build.outputs.version }}
          build-args: SERVICE_PATH=services/webhook-service

      - name: Build and push simulator-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          push: true
          tags: ${{ env.REGISTRY }}/payment-gateway/simulator-service:${{ needs.build.outputs.version }}
          build-args: SERVICE_PATH=services/simulator-service

      - name: Build and push settlement-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          push: true
          tags: ${{ env.REGISTRY }}/payment-gateway/settlement-service:${{ needs.build.outputs.version }}
          build-args: SERVICE_PATH=services/settlement-service

      - name: Build and push risk-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          push: true
          tags: ${{ env.REGISTRY }}/payment-gateway/risk-service:${{ needs.build.outputs.version }}
          build-args: SERVICE_PATH=services/risk-service

      - name: Build and push analytics-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          push: true
          tags: ${{ env.REGISTRY }}/payment-gateway/analytics-service:${{ needs.build.outputs.version }}
          build-args: SERVICE_PATH=services/analytics-service

      - name: Build and push merchant-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          push: true
          tags: ${{ env.REGISTRY }}/payment-gateway/merchant-service:${{ needs.build.outputs.version }}
          build-args: SERVICE_PATH=services/merchant-service

      - name: Build and push dispute-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.build
          push: true
          tags: ${{ env.REGISTRY }}/payment-gateway/dispute-service:${{ needs.build.outputs.version }}
          build-args: SERVICE_PATH=services/dispute-service

  deploy:
    needs: build-images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install payment-gateway ./k8s/helm/payment-gateway \
            --namespace payment-gateway \
            --create-namespace \
            --set global.imageRegistry=${{ env.REGISTRY }} \
            --set imagePullSecrets=ghcr \
            --wait --timeout 5m

  notify:
    needs: [build, build-images, deploy]
    runs-on: ubuntu-latest

    steps:
      - name: Send success notification
        if: success()
        run: echo "Deployment successful!"

      - name: Send failure notification
        if: failure()
        run: echo "Deployment failed!"