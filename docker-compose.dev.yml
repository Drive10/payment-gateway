# Hybrid Local Dev - Infrastructure Only
# Run: docker compose -f docker-compose.dev.yml up -d
# Then run services locally: make dev:service SERVICE=payment-service

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_DLQ_TOPIC_SUFFIX: .DLQ
      KAFKA_TRANSACTION_MAX_TIMEOUT_MS: 900000
    ports:
      - "9092:9092"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.00"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: authdb,orderdb,paymentdb,notificationdb,webhookdb,simulatordb,settlementdb,riskdb,analyticsdb,merchantdb,disputedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.00"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        SERVICE_PATH: services/api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      JWT_SECRET_B64: ${JWT_SECRET_B64}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://host.docker.internal:8081}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL:-http://host.docker.internal:8082}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://host.docker.internal:8083}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://host.docker.internal:8084}
      WEBHOOK_SERVICE_URL: ${WEBHOOK_SERVICE_URL:-http://host.docker.internal:8085}
      SIMULATOR_SERVICE_URL: ${SIMULATOR_SERVICE_URL:-http://host.docker.internal:8086}
      SETTLEMENT_SERVICE_URL: ${SETTLEMENT_SERVICE_URL:-http://host.docker.internal:8087}
      RISK_SERVICE_URL: ${RISK_SERVICE_URL:-http://host.docker.internal:8088}
      ANALYTICS_SERVICE_URL: ${ANALYTICS_SERVICE_URL:-http://host.docker.internal:8089}
      MERCHANT_SERVICE_URL: ${MERCHANT_SERVICE_URL:-http://host.docker.internal:8090}
      DISPUTE_SERVICE_URL: ${DISPUTE_SERVICE_URL:-http://host.docker.internal:8091}
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.75"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - dev-network

  frontend:
    build:
      context: ./web/frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - dev-network

  dashboard:
    build:
      context: ./web/dashboard
    ports:
      - "3001:80"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    networks:
      - dev-network

volumes:
  postgres_data:

networks:
  dev-network:
    name: dev-network
