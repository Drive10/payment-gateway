apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: payflow-prod

bases:
  - ../../base

commonLabels:
  environment: production

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      labelSelector: app=payment-service
  - patch: |-
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app: payment-service
                  topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      labelSelector: app=payment-service
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests
        value:
          memory: "512Mi"
          cpu: "250m"
    target:
      kind: Deployment
      labelSelector: app=payment-service

images:
  - name: api-gateway
    newTag: latest
  - name: auth-service
    newTag: latest
  - name: order-service
    newTag: latest
  - name: payment-service
    newTag: latest
  - name: notification-service
    newTag: latest
  - name: simulator-service
    newTag: latest