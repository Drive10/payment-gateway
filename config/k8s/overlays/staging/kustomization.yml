apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: payflow-staging

bases:
  - ../../base

commonLabels:
  environment: staging

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: "Always"
    target:
      kind: Deployment

images:
  - name: api-gateway
    newTag: staging
  - name: auth-service
    newTag: staging
  - name: order-service
    newTag: staging
  - name: payment-service
    newTag: staging
  - name: notification-service
    newTag: staging
  - name: simulator-service
    newTag: staging