services:
  payment:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8084}
  auth:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}
  ledger:
    url: ${LEDGER_SERVICE_URL:http://localhost:8082}
  notification:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}
  risk:
    url: ${RISK_SERVICE_URL:http://localhost:8085}
  settlement:
    url: ${SETTLEMENT_SERVICE_URL:http://localhost:8086}
  simulator:
    url: ${SIMULATOR_SERVICE_URL:http://localhost:8087}

spring:
  datasource:
    username: ${DB_USERNAME:${POSTGRES_USER:payment}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:paymentpass}}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
