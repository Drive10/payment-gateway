services:
  payment:
    url: ${PAYMENT_SERVICE_URL:http://payment-service:8084}
  auth:
    url: ${AUTH_SERVICE_URL:http://auth-service:8081}
  ledger:
    url: ${LEDGER_SERVICE_URL:http://ledger-service:8082}
  notification:
    url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8083}
  risk:
    url: ${RISK_SERVICE_URL:http://risk-service:8085}
  settlement:
    url: ${SETTLEMENT_SERVICE_URL:http://settlement-service:8086}
  simulator:
    url: ${SIMULATOR_SERVICE_URL:http://simulator-service:8087}

spring:
  datasource:
    username: ${POSTGRES_USER:payment}
    password: ${POSTGRES_PASSWORD:paymentpass}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

management:
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
