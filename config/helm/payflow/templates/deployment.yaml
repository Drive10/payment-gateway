apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
---
{{- $root := . -}}
{{- range $service := list "apiGateway" "authService" "orderService" "paymentService" "notificationService" "simulatorService" }}
{{- $svc := index $root.Values $service }}
{{- $name := lower (trimPrefix $service (. | toString)) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $service }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    app: {{ $service }}
    {{- include "payflow.labels" $root | nindent 4 }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      app: {{ $service }}
  template:
    metadata:
      labels:
        app: {{ $service }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $svc.port }}"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      {{- if $root.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range $root.Values.global.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: {{ $service }}
          image: "{{ $root.Values.image.repository }}/{{ $svc.image }}:{{ $root.Values.image.tag }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              name: http
          {{- if $svc.resources }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
          envFrom:
            - secretRef:
                name: payflow-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $service }}
  namespace: {{ $root.Release.Namespace }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: {{ $svc.port }}
      name: http
  selector:
    app: {{ $service }}
---
{{- end }}

{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payflow-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className }}
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
          {{- end }}
    {{- end }}
---
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: payflow-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  JWT_SECRET: ""
  GATEWAY_INTERNAL_SECRET: ""
  REDIS_PASSWORD: ""
  DB_USERNAME: payflow
  DB_PASSWORD: ""
  RAZORPAY_WEBHOOK_SECRET: ""
  STRIPE_WEBHOOK_SECRET: ""
  STRIPE_SIGNING_SECRET: ""
  PAYPAL_WEBHOOK_ID: ""
  WEBHOOK_SIGNATURE_SECRET: ""
  INTERNAL_SERVICE_SIGNING_SECRET: ""