global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'payflow-payment-service'
    static_configs:
      - targets: ['payment-service:8083']

  - job_name: 'payflow-auth-service'
    static_configs:
      - targets: ['auth-service:8082']

  - job_name: 'payflow-api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:7072']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'payflow-slos.yml'