version: '3.9'

# ============================================================
# Payment Gateway - Staging Environment Compose
# ============================================================
# Usage: docker compose -f docker-compose.staging.yml up -d
# Images: ghcr.io/Drive10/payment-gateway/*:staging-latest
# ============================================================

services:
  vault:
    image: hashicorp/vault:1.15
    container_name: vault-staging
    environment:
      VAULT_ADDR: http://vault-staging:8200
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-staging-root-token}
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    command: server -dev
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8200/v1/sys/health || exit 1"]
    restart: unless-stopped
    networks:
      - fintech-staging-network

  redis:
    image: redis:7-alpine
    container_name: redis-staging
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--save", "", "--appendonly", "no"]
    volumes:
      - redis-staging-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - fintech-staging-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres-staging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-staging-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - fintech-staging-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payment}"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka-staging
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-staging:29092,EXTERNAL://kafka-staging:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-staging:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    restart: unless-stopped
    networks:
      - fintech-staging-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  api-gateway:
    image: ${REGISTRY:-ghcr.io}/Drive10/payment-gateway-api-gateway:staging-latest
    container_name: api-gateway-staging
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SERVER_PORT: 8080
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_ADDR: http://vault-staging:8200
      VAULT_ENABLED: "true"
      AUTH_SERVICE_URL: http://auth-service-staging:8081
      ORDER_SERVICE_URL: http://order-service-staging:8082
      PAYMENT_SERVICE_URL: http://payment-service-staging:8083
      NOTIFICATION_SERVICE_URL: http://notification-service-staging:8084
      REDIS_HOST: redis-staging
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      redis-staging:
        condition: service_started
      auth-service-staging:
        condition: service_started
    networks:
      - fintech-staging-network

  auth-service:
    image: ${REGISTRY:-ghcr.io}/Drive10/payment-gateway-auth-service:staging-latest
    container_name: auth-service-staging
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SERVER_PORT: 8081
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_ADDR: http://vault-staging:8200
      VAULT_ENABLED: "true"
      DB_HOST: postgres-staging
      DB_PORT: 5432
      DB_NAME: authdb
      DB_USERNAME: ${DB_USERNAME:-payment}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis-staging
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka-staging:29092
    ports:
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      postgres-staging:
        condition: service_healthy
      redis-staging:
        condition: service_started
      kafka-staging:
        condition: service_started
    networks:
      - fintech-staging-network

  order-service:
    image: ${REGISTRY:-ghcr.io}/Drive10/payment-gateway-order-service:staging-latest
    container_name: order-service-staging
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SERVER_PORT: 8082
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_ADDR: http://vault-staging:8200
      VAULT_ENABLED: "true"
      DB_HOST: postgres-staging
      DB_PORT: 5432
      DB_NAME: orderdb
      DB_USERNAME: ${DB_USERNAME:-payment}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka-staging:29092
      PAYMENT_SERVICE_URL: http://payment-service-staging:8083
    ports:
      - "8082:8082"
    restart: unless-stopped
    depends_on:
      postgres-staging:
        condition: service_healthy
      kafka-staging:
        condition: service_started
    networks:
      - fintech-staging-network

  payment-service:
    image: ${REGISTRY:-ghcr.io}/Drive10/payment-gateway-payment-service:staging-latest
    container_name: payment-service-staging
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SERVER_PORT: 8083
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_ADDR: http://vault-staging:8200
      VAULT_ENABLED: "true"
      DB_HOST: postgres-staging
      DB_PORT: 5432
      DB_NAME: paymentdb
      DB_USERNAME: ${DB_USERNAME:-payment}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis-staging
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka-staging:29092
      ORDER_SERVICE_URL: http://order-service-staging:8082
      NOTIFICATION_SERVICE_URL: http://notification-service-staging:8084
    ports:
      - "8083:8083"
    restart: unless-stopped
    depends_on:
      postgres-staging:
        condition: service_healthy
      redis-staging:
        condition: service_started
      kafka-staging:
        condition: service_started
    networks:
      - fintech-staging-network

  notification-service:
    image: ${REGISTRY:-ghcr.io}/Drive10/payment-gateway-notification-service:staging-latest
    container_name: notification-service-staging
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SERVER_PORT: 8084
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_ADDR: http://vault-staging:8200
      VAULT_ENABLED: "true"
      DB_HOST: postgres-staging
      DB_PORT: 5432
      DB_NAME: notificationdb
      DB_USERNAME: ${DB_USERNAME:-payment}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka-staging:29092
    ports:
      - "8084:8084"
    restart: unless-stopped
    depends_on:
      postgres-staging:
        condition: service_healthy
      kafka-staging:
        condition: service_started
    networks:
      - fintech-staging-network

  simulator-service:
    image: ${REGISTRY:-ghcr.io}/Drive10/payment-gateway-simulator-service:staging-latest
    container_name: simulator-service-staging
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SERVER_PORT: 8086
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_ADDR: http://vault-staging:8200
      VAULT_ENABLED: "true"
      DB_HOST: postgres-staging
      DB_PORT: 5432
      DB_NAME: simulatordb
      DB_USERNAME: ${DB_USERNAME:-simulator}
      DB_PASSWORD: ${DB_PASSWORD}
      WEBHOOK_SERVICE_URL: http://notification-service-staging:8084
    ports:
      - "8086:8086"
    restart: unless-stopped
    depends_on:
      postgres-staging:
        condition: service_healthy
    networks:
      - fintech-staging-network

  analytics-service:
    image: ${REGISTRY:-ghcr.io}/Drive10/payment-gateway-analytics-service:staging-latest
    container_name: analytics-service-staging
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SERVER_PORT: 8085
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_ADDR: http://vault-staging:8200
      VAULT_ENABLED: "true"
      DB_HOST: postgres-staging
      DB_PORT: 5432
      DB_NAME: analyticsdb
      DB_USERNAME: ${DB_USERNAME:-payment}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka-staging:29092
    ports:
      - "8085:8085"
    restart: unless-stopped
    depends_on:
      postgres-staging:
        condition: service_healthy
      kafka-staging:
        condition: service_started
    networks:
      - fintech-staging-network

volumes:
  postgres-staging-data:
  redis-staging-data:

networks:
  fintech-staging-network:
    driver: bridge
