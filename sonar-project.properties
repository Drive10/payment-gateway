# sonar-project.properties - SonarQube Configuration for PayFlow

# Project identification
sonar.projectKey=Drive10_payflow
sonar.projectName=PayFlow
sonar.projectVersion=1.0.0

# Organization (update with your SonarCloud organization)
sonar.organization=drive10

# Sources
sonar.sources=services,libs
sonar.tests=services

# Language
sonar.language=java

# Java configuration
sonar.java.source=21
sonar.java.target=21
sonar.java.binaries=target/classes

# Exclusions
sonar.exclusions=**/target/**,**/node_modules/**,**/dist/**,**/build/**

# Test coverage
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Enable analysis for Maven modules
sonar.maven.projectKey=dev.payflow:payflow

# Additional quality gates
sonar.qualitygate.wait=true