openapi: 3.0.3
info:
  title: Payment Gateway API
  description: |
    Enterprise-grade payment processing API with support for:
    - Card payments (Visa, Mastercard, etc.)
    - Partial payments and refunds
    - Multi-currency transactions
    - Webhook notifications
    - Idempotent operations
  version: 1.0.0
  contact:
    name: API Support
    email: api@payment-gateway.example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.payment-gateway.example.com/v1
    description: Production
  - url: https://sandbox.payment-gateway.example.com/v1
    description: Sandbox

tags:
  - name: Authentication
    description: User authentication and token management
  - name: Payments
    description: Payment processing operations
  - name: Refunds
    description: Refund operations
  - name: Merchants
    description: Merchant management
  - name: Webhooks
    description: Webhook configuration and management

paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Authentication]
      summary: User login
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /payments:
    post:
      tags: [Payments]
      summary: Create a new payment
      description: |
        Create a payment with idempotency support.
        Include `Idempotency-Key` header to ensure exactly-once processing.
      operationId: createPayment
      headers:
        Idempotency-Key:
          description: Unique key for idempotent request
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /payments/{paymentId}:
    get:
      tags: [Payments]
      summary: Get payment by ID
      operationId: getPayment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /payments/{paymentId}/refunds:
    post:
      tags: [Refunds]
      summary: Create a refund
      description: |
        Create a full or partial refund for a payment.
        Supports partial refunds up to the original payment amount.
      operationId: createRefund
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
      responses:
        '201':
          description: Refund created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /payments/{paymentId}/capture:
    post:
      tags: [Payments]
      summary: Capture an authorized payment
      description: Capture a previously authorized payment
      operationId: capturePayment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureRequest'
      responses:
        '200':
          description: Payment captured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login

  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Token expiration time in seconds
        tokenType:
          type: string
          example: Bearer

    PaymentRequest:
      type: object
      required:
        - amount
        - currency
        - paymentMethod
      properties:
        amount:
          type: integer
          description: Amount in smallest currency unit (cents)
          example: 1000
        currency:
          type: string
          description: ISO 4217 currency code
          example: USD
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        orderId:
          type: string
          description: Optional order reference
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true

    PaymentMethod:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [card, bank_transfer, wallet]
        card:
          $ref: '#/components/schemas/CardDetails'

    CardDetails:
      type: object
      properties:
        number:
          type: string
          description: Card number (can be tokenized)
        expiryMonth:
          type: string
          pattern: '^(0[1-9]|1[0-2])$'
        expiryYear:
          type: string
          pattern: '^\d{2}$'
        cvv:
          type: string
          minLength: 3
          maxLength: 4
        cardholderName:
          type: string

    PaymentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [INITIATED, AUTHORIZED, CAPTURED, FAILED, REFUNDED, PARTIALLY_REFUNDED]
        amount:
          type: integer
        currency:
          type: string
        capturedAmount:
          type: integer
        refundedAmount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RefundRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: integer
          description: Amount to refund in smallest currency unit
        reason:
          type: string
          enum: [DUPLICATE, FRAUDULENT, CUSTOMER_REQUEST]

    RefundResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        paymentId:
          type: string
          format: uuid
        amount:
          type: integer
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        reason:
          type: string
        createdAt:
          type: string
          format: date-time

    CaptureRequest:
      type: object
      properties:
        amount:
          type: integer
          description: Amount to capture (partial capture supported)

    Error:
      type: object
      properties:
        code:
          type: string
          example: PAYMENT_DECLINED
        message:
          type: string
          example: Payment was declined by the issuer
        correlationId:
          type: string
        timestamp:
          type: string
          format: date-time
        details:
          type: object

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

security:
  - bearerAuth: []
