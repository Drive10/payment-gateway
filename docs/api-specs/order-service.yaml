openapi: 3.0.3
info:
  title: PayFlow Order Service API
  description: API for order management and merchant operations
  version: 1.0.0
  contact:
    name: PayFlow Team
    email: dev@payflow.dev

servers:
  - url: http://localhost:8082
    description: Development server
  - url: https://orders.payflow.dev
    description: Production server

tags:
  - name: Orders
    description: Order management
  - name: Merchants
    description: Merchant operations

paths:
  /orders:
    post:
      tags:
        - Orders
      summary: Create a new order
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      security:
        - BearerAuth: []
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Invalid request

    get:
      tags:
        - Orders
      summary: Get all orders
      operationId: getOrders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /orders/{orderId}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      operationId: getOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

    put:
      tags:
        - Orders
      summary: Update order
      operationId: updateOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderRequest'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Order updated

  /orders/{orderId}/cancel:
    post:
      tags:
        - Orders
      summary: Cancel order
      operationId: cancelOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Order cancelled

  /merchants:
    post:
      tags:
        - Merchants
      summary: Create merchant
      operationId: createMerchant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMerchantRequest'
      security:
        - BearerAuth: []
      responses:
        '201':
          description: Merchant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

    get:
      tags:
        - Merchants
      summary: Get all merchants
      operationId: getMerchants
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of merchants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /merchants/{merchantId}:
    get:
      tags:
        - Merchants
      summary: Get merchant by ID
      operationId: getMerchant
      parameters:
        - name: merchantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Merchant details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

    put:
      tags:
        - Merchants
      summary: Update merchant
      operationId: updateMerchant
      parameters:
        - name: merchantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMerchantRequest'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Merchant updated

  /merchants/{merchantId}/api-keys:
    post:
      tags:
        - Merchants
      summary: Generate API key
      operationId: generateApiKey
      parameters:
        - name: merchantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '201':
          description: API key generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

    get:
      tags:
        - Merchants
      summary: Get merchant API keys
      operationId: getApiKeys
      parameters:
        - name: merchantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /merchants/{merchantId}/api-keys/{keyId}:
    delete:
      tags:
        - Merchants
      summary: Revoke API key
      operationId: revokeApiKey
      parameters:
        - name: merchantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: keyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '204':
          description: API key revoked

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        message:
          type: string

    CreateOrderRequest:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: number
          format: decimal
        currency:
          type: string
          default: INR
        description:
          type: string
        customerEmail:
          type: string
        metadata:
          type: object

    UpdateOrderRequest:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, PROCESSING, COMPLETED, CANCELLED]

    CreateMerchantRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        businessType:
          type: string

    UpdateMerchantRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        businessType:
          type: string

    OrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
        amount:
          type: number
          format: decimal
        currency:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    MerchantResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    ApiKeyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time