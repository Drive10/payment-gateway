<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Payment and Refund Flow</title>
  <desc id="desc">Sequence of checkout, order, payment, capture, ledger posting, Kafka eventing, and refund processing.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .lane { fill: #111c33; stroke: #38bdf8; stroke-width: 1.5; }
      .box { fill: #1d4ed8; stroke: #93c5fd; stroke-width: 2; rx: 14; }
      .box2 { fill: #164e63; stroke: #67e8f9; stroke-width: 2; rx: 14; }
      .txt { fill: #e2e8f0; font: 600 22px 'Segoe UI', sans-serif; }
      .sub { fill: #cbd5e1; font: 500 17px 'Segoe UI', sans-serif; }
      .arrow { stroke: #7dd3fc; stroke-width: 3; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="640"/>
  <text x="60" y="64" class="txt" font-size="34">Razorpay-Style Payment Lifecycle</text>
  <text x="60" y="100" class="sub">JWT auth, idempotent payment creation, secure webhooks, Kafka events, ledger reversals, and replay-safe refunds.</text>

  <rect x="70" y="145" width="1120" height="58" class="lane"/>
  <text x="112" y="181" class="txt">1. Customer registers or logs in and receives a JWT through the gateway.</text>

  <rect x="70" y="225" width="1120" height="58" class="lane"/>
  <text x="112" y="261" class="txt">2. Checkout creates an order and a payment with an Idempotency-Key.</text>

  <rect x="70" y="305" width="1120" height="58" class="lane"/>
  <text x="112" y="341" class="txt">3. payment-service records the intent, calls simulator or provider, and emits payment.created.</text>

  <rect x="70" y="385" width="1120" height="58" class="lane"/>
  <text x="112" y="421" class="txt">4. Capture posts double-entry ledger journals and emits payment.captured to Kafka.</text>

  <rect x="70" y="465" width="1120" height="58" class="lane"/>
  <text x="112" y="501" class="txt">5. notification-service consumes idempotently, retries on failure, then moves poison events to DLT.</text>

  <rect x="70" y="545" width="1120" height="58" class="lane"/>
  <text x="112" y="581" class="txt">6. Refund API supports partial and multiple refunds, blocks over-refunds, and posts reversal entries.</text>

  <rect x="85" y="140" width="144" height="468" class="box2"/>
  <text x="110" y="390" class="txt" transform="rotate(-90 110 390)">Frontend</text>
  <rect x="300" y="140" width="144" height="468" class="box2"/>
  <text x="325" y="390" class="txt" transform="rotate(-90 325 390)">Gateway</text>
  <rect x="515" y="140" width="144" height="468" class="box"/>
  <text x="540" y="430" class="txt" transform="rotate(-90 540 430)">Payment</text>
  <rect x="730" y="140" width="144" height="468" class="box2"/>
  <text x="755" y="405" class="txt" transform="rotate(-90 755 405)">Ledger</text>
  <rect x="945" y="140" width="144" height="468" class="box2"/>
  <text x="970" y="448" class="txt" transform="rotate(-90 970 448)">Kafka</text>
</svg>
