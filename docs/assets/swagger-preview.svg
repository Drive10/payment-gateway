<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Swagger Preview</title>
  <desc id="desc">Illustrated preview of documented payment, refund, and webhook endpoints.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .header { fill: #0f172a; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; }
      .post { fill: #16a34a; }
      .get { fill: #2563eb; }
      .webhook { fill: #7c3aed; }
      .txt { fill: #0f172a; font: 600 24px 'Segoe UI', sans-serif; }
      .sub { fill: #334155; font: 500 17px 'Segoe UI', sans-serif; }
      .tag { fill: #ffffff; font: 700 15px 'Segoe UI', sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <rect class="header" width="1280" height="92"/>
  <text x="60" y="56" fill="#f8fafc" font-family="Segoe UI, sans-serif" font-size="34" font-weight="700">OpenAPI / Swagger Preview</text>

  <rect x="58" y="138" width="1160" height="108" class="panel"/>
  <rect x="86" y="170" width="82" height="34" rx="8" class="post"/>
  <text x="107" y="193" class="tag">POST</text>
  <text x="196" y="193" class="txt">/api/v1/payments</text>
  <text x="196" y="222" class="sub">Create payment with Idempotency-Key, TEST/PRODUCTION mode, and provider selection.</text>

  <rect x="58" y="276" width="1160" height="108" class="panel"/>
  <rect x="86" y="308" width="82" height="34" rx="8" class="post"/>
  <text x="107" y="331" class="tag">POST</text>
  <text x="196" y="331" class="txt">/api/v1/payments/{paymentId}/refunds</text>
  <text x="196" y="360" class="sub">Partial and multiple refunds with over-refund protection and refund idempotency.</text>

  <rect x="58" y="414" width="1160" height="108" class="panel"/>
  <rect x="86" y="446" width="82" height="34" rx="8" class="webhook"/>
  <text x="98" y="469" class="tag">HOOK</text>
  <text x="196" y="469" class="txt">/api/v1/webhooks/razorpay</text>
  <text x="196" y="498" class="sub">HMAC validation, replay protection by event id, and secure capture/refund updates.</text>

  <rect x="58" y="552" width="1160" height="108" class="panel"/>
  <rect x="86" y="584" width="82" height="34" rx="8" class="get"/>
  <text x="116" y="607" class="tag">GET</text>
  <text x="196" y="607" class="txt">/api/v1/payments/{paymentId}</text>
  <text x="196" y="636" class="sub">Trace payment status, refund totals, simulation mode, and lifecycle state from a single endpoint.</text>
</svg>
